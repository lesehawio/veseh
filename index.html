<!DOCTYPE html>
<html dir="rtl" lang="fa">

    <link rel="icon" type="image/png" sizes="16x16" href="https://uploadkon.ir/uploads/cc0505_26ChatGPT-Image-Jul-6-2026-12-58-54-AM.png" />
    <link rel="shortcut icon" href="https://uploadkon.ir/uploads/cc0505_26ChatGPT-Image-Jul-6-2026-12-58-54-AM.png" />

    <style>
        /* ===== ROOT ===== */
        :root {
            --deep-navy: #0B0720;
            --soft-purple: #7C3AED;
            --magical-blue: #38BDF8;
            --soft-pink: #F0ABFC;
            --indigo: #4F46E5;
            --light-bg: #F5F0FF;
            --light-text: #1A0D2E;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-sec: rgba(255, 255, 255, 0.55);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 25px 70px rgba(124, 58, 237, 0.12);
            --radius-lg: 28px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.light-mode {
            --deep-navy: #F5F0FF;
            --glass: rgba(255, 255, 255, 0.5);
            --border: rgba(124, 58, 237, 0.06);
            --text: #1A0D2E;
            --text-sec: #4A2A6A;
            --shadow: 0 20px 60px rgba(124, 58, 237, 0.04);
            --shadow-hover: 0 25px 70px rgba(124, 58, 237, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--deep-navy);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(155, 107, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--soft-purple), var(--magical-blue), var(--soft-pink));
            border-radius: 10px;
        }

        /* ===== MAGICAL BG ===== */
        .magic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.10) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(79, 70, 229, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(56, 189, 248, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(240, 171, 252, 0.05) 0%, transparent 50%),
                var(--deep-navy);
            transition: background 0.4s ease;
        }
        .sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--magical-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px 3px rgba(56, 189, 248, 0.10);
            animation: floatUp linear infinite;
            opacity: 0;
        }
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(240, 171, 252, 0.04), rgba(56, 189, 248, 0.01));
            border: 1px solid rgba(240, 171, 252, 0.02);
            animation: floatUpBubble linear infinite;
            opacity: 0;
            backdrop-filter: blur(2px);
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) scale(1.1);
                opacity: 0;
            }
        }
        @keyframes floatUpBubble {
            0% {
                transform: translateY(100vh) scale(0.3) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.10;
            }
            85% {
                opacity: 0.10;
            }
            100% {
                transform: translateY(-10vh) scale(1) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== HEADER ===== */
        .header {
            width: 100%;
            background: rgba(11, 7, 32, 0.50);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.3s ease;
            min-height: 52px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .menu-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--text);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:hover {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            transform: scale(1.04);
        }
        .logo-img {
            height: 32px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 2px 12px rgba(167, 139, 250, 0.15));
            transition: all 0.3s ease;
        }
        .logo-img:hover {
            transform: scale(1.04);
        }
        .header-right {
            display: flex;
            gap: 0.3rem;
            align-items: center;
        }
        .icon-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-sec);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            color: var(--text);
            transform: scale(1.04);
        }
        .lang-btn {
            font-weight: 700;
            font-size: 0.6rem;
            width: 38px;
            letter-spacing: 0.3px;
        }

        /* ===== MAIN WRAPPER — وسط صفحه ===== */
        .main-wrapper {
            width: 100%;
            max-width: 600px;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            position: relative;
            z-index: 1;
        }

        /* ===== کاراکتر VESEH (بدون قاب) ===== */
        .veseh-character-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 0.8rem;
            width: 100%;
            position: relative;
        }
        .veseh-character-wrapper .veseh-img {
            height: 110px;
            width: 110px;
            object-fit: contain;
            filter: drop-shadow(0 6px 30px rgba(167, 139, 250, 0.15));
            transition: transform 0.3s ease;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0;
            border-radius: 0;
        }
        .veseh-character-wrapper .veseh-img:hover {
            transform: scale(1.05) rotate(-2deg);
        }
        .veseh-character-wrapper .veseh-img.sleeping {
            filter: drop-shadow(0 6px 30px rgba(167, 139, 250, 0.05)) grayscale(0.2);
        }
        .veseh-character-wrapper .chat-bubble-mini {
            position: absolute;
            top: -18px;
            right: calc(50% + 70px);
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px 20px 4px 20px;
            padding: 0.35rem 1rem;
            font-size: 0.75rem;
            color: var(--text);
            white-space: nowrap;
            box-shadow: var(--shadow);
            animation: floatBubble 2.5s ease-in-out infinite;
            border: 1px solid rgba(56, 189, 248, 0.06);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
        }
        .veseh-character-wrapper .chat-bubble-mini.hidden {
            display: none;
        }
        @keyframes floatBubble {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }
        .veseh-character-wrapper .chat-bubble-mini::after {
            content: '';
            position: absolute;
            bottom: -6px;
            right: 14px;
            width: 10px;
            height: 10px;
            background: var(--glass);
            border-radius: 0 0 8px 0;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        @media(max-width:640px) {
            .veseh-character-wrapper .chat-bubble-mini {
                right: calc(50% + 40px);
                font-size: 0.6rem;
                padding: 0.2rem 0.7rem;
                max-width: 130px;
                top: -14px;
            }
            .veseh-character-wrapper .veseh-img {
                height: 85px;
                width: 85px;
            }
            .main-wrapper {
                min-height: 60vh;
                padding: 0 0.6rem;
            }
        }

        /* ===== جعبه جستجو ===== */
        .hero-search-wrapper {
            width: 100%;
            max-width: 580px;
            position: relative;
        }

        .hero-search-box {
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 0.2rem 0.2rem 0.2rem 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            position: relative;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.04), rgba(79, 70, 229, 0.03), rgba(56, 189, 248, 0.02));
        }
        .hero-search-box:focus-within {
            border-color: var(--magical-blue);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.04), var(--shadow);
        }
        .hero-search-box .search-icon {
            color: var(--text-sec);
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .hero-search-box .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.5rem 0.1rem;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            font-family: inherit;
            min-height: 44px;
        }
        .hero-search-box .search-input::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }
        .hero-search-box .search-actions {
            display: flex;
            gap: 0.15rem;
            align-items: center;
            flex-shrink: 0;
        }
        .hero-search-box .search-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 3rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sec);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
        }
        .hero-search-box .search-btn:hover {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            color: var(--text);
            transform: scale(1.04);
        }
        .hero-search-box .search-btn.mic-active {
            color: var(--magical-blue);
            border-color: var(--magical-blue);
            animation: pulseMic 1s infinite;
        }
        .hero-search-box .search-btn.clear-btn {
            font-size: 0.75rem;
            width: 36px;
            padding: 0;
        }
        .hero-search-box .search-btn.filter-btn {
            font-size: 0.7rem;
            width: auto;
            padding: 0 0.7rem;
            gap: 0.2rem;
            display: flex;
            align-items: center;
            background: rgba(124, 58, 237, 0.04);
            border-color: rgba(124, 58, 237, 0.06);
        }
        .hero-search-box .search-btn.filter-btn .filter-badge {
            font-size: 0.45rem;
            background: linear-gradient(135deg, var(--soft-purple), var(--magical-blue));
            color: white;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .hero-search-box .search-btn.filter-btn.active {
            border-color: var(--magical-blue);
            color: var(--magical-blue);
        }

        @keyframes pulseMic {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        /* ===== دکمه برگشت (Back) ===== */
        .back-btn-wrapper {
            width: 100%;
            max-width: 580px;
            display: none;
            margin-bottom: 0.6rem;
            justify-content: flex-start;
        }
        .back-btn-wrapper.visible {
            display: flex;
        }
        .back-btn-wrapper .back-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.3rem 1rem;
            color: var(--text-sec);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: inherit;
        }
        .back-btn-wrapper .back-btn:hover {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            color: var(--text);
            transform: scale(1.04);
        }

        /* ===== FILTER DROPDOWN ===== */
        .filter-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: rgba(11, 7, 32, 0.90);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.6rem 0.8rem;
            display: none;
            z-index: 95;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: var(--shadow);
            background: linear-gradient(135deg, rgba(11, 7, 32, 0.92), rgba(79, 70, 229, 0.05));
        }
        .filter-dropdown.open {
            display: block;
            animation: fadeInDown 0.25s ease;
        }
        .filter-dropdown .filter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .filter-dropdown .filter-chip {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.15rem 0.7rem;
            font-size: 0.65rem;
            color: var(--text-sec);
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            border-color: rgba(56, 189, 248, 0.04);
        }
        .filter-dropdown .filter-chip:hover {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            color: var(--text);
            transform: scale(1.03);
        }
        .filter-dropdown .filter-chip.active {
            background: rgba(167, 139, 250, 0.08);
            border-color: var(--magical-blue);
            color: var(--text);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.02);
        }
        .filter-dropdown .filter-chip .fc-count {
            font-size: 0.45rem;
            opacity: 0.4;
        }
        .filter-dropdown .filter-chip .fc-icon {
            font-size: 0.55rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== RESULTS ===== */
        .results-container {
            width: 100%;
            max-width: 580px;
            margin-top: 0.8rem;
            display: none;
            animation: fadeInUp 0.3s ease;
        }
        .results-container.visible {
            display: block;
        }
        .results-container .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            padding: 0 0.2rem;
        }
        .results-container .results-header .count {
            font-size: 0.75rem;
            color: var(--text-sec);
            opacity: 0.5;
        }

        /* ===== EXPRESSION CARDS ===== */
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .expr-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.8rem 1rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.02), rgba(79, 70, 229, 0.01));
        }
        .expr-card:hover {
            transform: translateY(-3px);
            border-color: rgba(167, 139, 250, 0.12);
            box-shadow: var(--shadow-hover);
        }
        .expr-card[data-primary-tag="home"] {
            border-left: 3px solid #7C3AED;
        }
        .expr-card[data-primary-tag="kitchen"] {
            border-left: 3px solid #F59E0B;
        }

            border-left: 3px solid #EF4444;

        .expr-card[data-primary-tag="call"] {

            gap: 0.6rem;
        }
        .expr-card .expr-eng {

            font-size: 0.95rem;
            color: var(--text);
            direction: ltr;
            text-align: left;
        }
        .expr-card .expr-pron {
            font-size: 0.65rem;
            color: var(--text-sec);
            direction: ltr;
            text-align: left;
            opacity: 0.4;
            margin-top: 0.05rem;

        .expr-card .expr-fa {
            font-size: 0.8rem;
            color: var(--text-sec);

        .expr-card .expr-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.2rem;
            margin-top: 0.3rem;
        }
        .expr-card .expr-tag {
            font-size: 0.5rem;
            background: rgba(167, 139, 250, 0.04);
            border: 1px solid rgba(167, 139, 250, 0.04);

            padding: 0.05rem 0.5rem;
            color: var(--text-sec);
            display: flex;
            align-items: center;
            gap: 0.15rem;
            border-color: rgba(56, 189, 248, 0.04);

        .expr-card .expr-tag .tag-icon {

        .expr-card .expr-actions {
            display: flex;
            gap: 0.2rem;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .expr-card .action-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 3rem;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sec);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.7rem;
            border-color: rgba(56, 189, 248, 0.04);

        .expr-card .action-btn:hover {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            color: var(--text);
            transform: scale(1.05);
        }
        .expr-card .action-btn.saved {
            color: #F59E0B;
            border-color: rgba(245, 158, 11, 0.12);
        }
        .expr-card .action-btn.playing {
            color: var(--magical-blue);
            border-color: var(--magical-blue);
            animation: pulsePlay 0.8s infinite;
        }
        .expr-card .action-btn.record-active {
            color: var(--soft-pink);
            border-color: var(--soft-pink);
            background: rgba(240, 171, 252, 0.04);
        }
        @keyframes pulsePlay {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            opacity: 0.3;
        }
        .empty-state i {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.4rem;
            color: var(--magical-blue);
        }
        .empty-state .empty-title {
            font-size: 0.95rem;
            font-weight: 600;
        }
        .empty-state .empty-desc {
            font-size: 0.75rem;
            color: var(--text-sec);
            margin-top: 0.2rem;
        }

        /* ===== RECORD PANEL ===== */
        .record-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(11, 7, 32, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            padding: 0.4rem 0.6rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            z-index: 80;
            transition: all 0.3s ease;
            min-height: 50px;
            border-top-color: rgba(56, 189, 248, 0.04);
        }
        .record-panel .record-label {
            font-size: 0.6rem;
            color: var(--text-sec);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .record-panel .record-label .selected-text {
            color: var(--text);
            font-weight: 500;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .record-panel .rec-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.2rem 0.7rem;
            color: var(--text-sec);
            cursor: pointer;
            font-size: 0.6rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            min-height: 28px;
            font-family: inherit;
            border-color: rgba(56, 189, 248, 0.04);
        }
        .record-panel .rec-btn:hover:not(:disabled) {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            color: var(--text);
            transform: scale(1.02);
        }
        .record-panel .rec-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .record-panel .rec-btn.recording {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.12);
            color: #EF4444;
            animation: pulseRec 1.5s infinite;
        }
        @keyframes pulseRec {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.05);
            }
            50% {
                box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
            }
        }
        .record-panel .visualizer {
            display: inline-flex;
            gap: 2px;
            align-items: center;
            height: 18px;
        }
        .record-panel .visualizer span {
            width: 2px;
            height: 6px;
            background: var(--magical-blue);
            border-radius: 2px;
            animation: wave 0.6s infinite;
        }
        .record-panel .visualizer span:nth-child(2) {
            animation-delay: 0.1s;
        }
        .record-panel .visualizer span:nth-child(3) {
            animation-delay: 0.2s;
        }
        .record-panel .visualizer span:nth-child(4) {
            animation-delay: 0.3s;
        }
        .record-panel .visualizer span:nth-child(5) {
            animation-delay: 0.4s;
        }
        .record-panel .visualizer span:nth-child(6) {
            animation-delay: 0.5s;
        }
        @keyframes wave {
            0%,
            100% {
                height: 5px;
            }
            50% {
                height: 14px;
            }
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 340px;
            max-width: 88vw;
            height: 100%;
            background: rgba(11, 7, 32, 0.92);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-left: 1px solid var(--border);
            z-index: 1000;
            transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 1rem;
            overflow-y: auto;
            box-shadow: -10px 0 60px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, rgba(11, 7, 32, 0.92), rgba(79, 70, 229, 0.04));
        }
        .sidebar.open {
            right: 0;
        }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.30);
            backdrop-filter: blur(3px);
            z-index: 999;
            display: none;
        }
        .sidebar-overlay.active {
            display: block;
        }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
            border-bottom-color: rgba(56, 189, 248, 0.04);
        }
        .sidebar-header .brand {
            font-weight: 800;
            font-size: 1.2rem;
            background: linear-gradient(135deg, var(--soft-purple), var(--magical-blue), var(--soft-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-header .brand i {
            -webkit-text-fill-color: initial;
            color: var(--soft-purple);
        }
        .sidebar-close {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            padding: 0.3rem 0.7rem;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-sec);
            transition: 0.3s;
        }
        .sidebar-close:hover {
            color: var(--text);
            border-color: var(--soft-purple);
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.5rem 0.8rem;
            border-radius: var(--radius-sm);
            color: var(--text-sec);
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: transparent;
            width: 100%;
            font-size: 0.85rem;
            font-family: inherit;
            text-align: right;
        }
        .sidebar-nav .nav-item:hover {
            background: rgba(167, 139, 250, 0.04);
            color: var(--text);
            transform: translateX(-3px);
        }
        .sidebar-nav .nav-item.active {
            background: rgba(167, 139, 250, 0.06);
            color: var(--magical-blue);
        }
        .sidebar-nav .nav-item i {
            width: 20px;
            font-size: 1rem;
        }
        .sidebar-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 0.5rem 0;
            border-top-color: rgba(56, 189, 248, 0.04);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.3rem;
            margin-top: 0.4rem;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.3rem 0.2rem;
            text-align: center;
            border-color: rgba(56, 189, 248, 0.04);
        }
        .stat-box .stat-number {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--magical-blue);
        }
        .stat-box .stat-label {
            font-size: 0.45rem;
            color: var(--text-sec);
        }

        /* ===== MIC OVERLAY ===== */
        .mic-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 7, 32, 0.75);
            backdrop-filter: blur(24px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1.5rem;
        }
        .mic-overlay.open {
            display: flex;
        }
        .mic-overlay .mic-icon {
            font-size: 4rem;
            color: var(--magical-blue);
            animation: pulseMic 1s infinite;
        }
        .mic-overlay .mic-text {
            font-size: 1.1rem;
            color: var(--text-sec);
        }
        .mic-overlay .mic-result {
            font-size: 1.2rem;
            color: var(--text);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.5rem 1.5rem;
            border-radius: 3rem;
            border: 1px solid var(--border);
        }
        .mic-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-sec);
            background: none;
            border: none;
            padding: 0.5rem;
        }
        .mic-close:hover {
            color: var(--text);
        }

        /* ===== RESPONSIVE ===== */
        @media(max-width:640px) {
            .header {
                padding: 0.3rem 0.6rem;
                min-height: 46px;
            }
            .menu-btn {
                width: 32px;
                height: 32px;
                font-size: 0.85rem;
            }
            .logo-img {
                height: 26px;
            }
            .icon-btn {
                width: 30px;
                height: 30px;
                font-size: 0.7rem;
            }
            .lang-btn {
                width: 34px;
                font-size: 0.55rem;
            }
            .main-wrapper {
                min-height: 50vh;
                padding: 0 0.5rem;
            }
            .hero-search-box {
                padding: 0.15rem 0.15rem 0.15rem 0.4rem;
                border-radius: var(--radius-md);
            }
            .hero-search-box .search-input {
                font-size: 0.85rem;
                min-height: 38px;
                padding: 0.3rem 0.05rem;
            }
            .hero-search-box .search-btn {
                width: 32px;
                height: 32px;
                font-size: 0.7rem;
            }
            .hero-search-box .search-btn.clear-btn {
                width: 32px;
            }
            .hero-search-box .search-btn.filter-btn {
                padding: 0 0.5rem;
                font-size: 0.6rem;
            }
            .filter-dropdown {
                padding: 0.5rem 0.6rem;
                max-height: 160px;
            }
            .filter-dropdown .filter-chip {
                font-size: 0.55rem;
                padding: 0.1rem 0.6rem;
            }
            .results-container {
                margin-top: 0.6rem;
            }
            .expr-card {
                padding: 0.6rem 0.7rem;
            }
            .expr-card .expr-eng {
                font-size: 0.85rem;
            }
            .expr-card .expr-fa {
                font-size: 0.7rem;
            }
            .expr-card .action-btn {
                width: 28px;
                height: 28px;
                font-size: 0.65rem;
            }
            .record-panel {
                padding: 0.3rem 0.4rem;
                gap: 0.2rem;
                min-height: 44px;
            }
            .record-panel .rec-btn {
                font-size: 0.55rem;
                padding: 0.15rem 0.6rem;
                min-height: 26px;
            }
            .record-panel .record-label {
                font-size: 0.55rem;
            }
            .record-panel .record-label .selected-text {
                max-width: 60px;
            }
            .sidebar {
                width: 300px;
                padding: 0.8rem;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .mic-overlay .mic-icon {
                font-size: 3rem;
            }
            .mic-overlay .mic-text {
                font-size: 0.9rem;
            }
            .back-btn-wrapper .back-btn {
                font-size: 0.6rem;
                padding: 0.2rem 0.8rem;
            }
        }

        @media(min-width:768px) {
            .sidebar {
                width: 380px;
                padding: 1.5rem;
            }
            .veseh-character-wrapper .veseh-img {
                height: 130px;
                width: 130px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <!-- ===== MAGIC BG ===== -->

    <!-- ===== MIC OVERLAY ===== -->
    <div class="mic-overlay" id="micOverlay">

        <div class="mic-text" id="micText">برای جستجوی صوتی صحبت کنید...</div>
        <div class="mic-result" id="micResult"></div>

    <!-- ============================================================
    MAIN WRAPPER — وسط صفحه
    ============================================================ -->
    <div class="main-wrapper">

        <!-- ===== کاراکتر VESEH (بدون قاب) ===== -->
        <div class="veseh-character-wrapper" id="vesehWrapper">

            <img id="vesehImage" class="veseh-img"
            src="https://uploadkon.ir/uploads/67b906_26veseh1.png"
            alt="VESEH Character" />
        </div>

        <!-- ===== جعبه جستجو ===== -->
        <div class="hero-search-wrapper">
            <div class="hero-search-box" id="heroSearchBox">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput"

                    <button class="search-btn filter-btn" id="filterBtn">

                    </button>

            </div>
            <div id="contentContainer"></div>
        </div>

        <!-- ===== اطلاعات پایین ===== -->
        <div style="margin-top:0.8rem; font-size:0.65rem; color:var(--text-sec); opacity:0.3; text-align:center;">
            <span id="totalInfo">0 عبارت • 0 تگ</span>
        </div>
    </div>

    <!-- ===== RECORD PANEL ===== -->
    <div class="record-panel" id="recordPanel">
        <div class="record-label">
            <i class="fas fa-microphone-alt"></i>
            <span class="selected-text" id="selectedLabel">عبارتی را انتخاب کن</span>
        </div>
        <button class="rec-btn" id="startRecBtn"><i class="fas fa-circle" style="color:#EF4444; font-size:0.4rem;"></i> ضبط</button>
        <button class="rec-btn" id="stopRecBtn" disabled><i class="fas fa-stop"></i> توقف</button>
        <button class="rec-btn" id="playRecBtn" disabled><i class="fas fa-play"></i> پخش</button>
        <button class="rec-btn" id="saveRecBtn" disabled><i class="fas fa-save"></i> ذخیره</button>
        <div class="visualizer" id="visualizer" style="display:none;">
            <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <audio id="recAudio" style="display:none;"></audio>
    </div>

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="brand"><i class="fas fa-sparkles"></i> VESEH</span>
            <button class="sidebar-close" id="closeSidebar"><i class="fas fa-times"></i></button>

        <nav class="sidebar-nav">

        <div style="margin-top:1rem;">
            <div style="font-size:0.6rem; font-weight:700; color:var(--magical-blue); margin-bottom:0.3rem;">

            </div>
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-number" id="statTotal">0</div><div class="stat-label">چانک</div></div>
                <div class="stat-box"><div class="stat-number" id="statTags">0</div><div class="stat-label">تگ</div></div>
                <div class="stat-box"><div class="stat-number" id="statBookmarks">0</div><div class="stat-label">نشان</div></div>

        <div style="margin-top:0.6rem; background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:var(--radius-md); padding:0.6rem 0.8rem; border-color:rgba(56,189,248,0.04);">

            <div style="font-size:0.75rem; font-weight:600;" id="randomEng">—</div>
            <div style="font-size:0.55rem; color:var(--text-sec); opacity:0.4; direction:ltr;" id="randomPron"></div>
            <div style="font-size:0.7rem; color:var(--text-sec); margin-top:0.1rem;" id="randomFa">—</div>
            <button class="rec-btn" style="margin-top:0.2rem; font-size:0.5rem; padding:0.1rem 0.6rem;" id="randomPlayBtn"><i class="fas fa-play"></i> پخش</button>

        function getRandomCharacterMessage(stateKey) {
            const state = getCharacterState(stateKey);
            if (!state || !state.messages) return '👋 Hello!';
            const msgList = state.messages[currentLanguage] || state.messages.fa;
            if (!msgList || msgList.length === 0) return '👋 Hello!';
            if (msgList.length === 1) return msgList[0];
            if (usedIndices.length >= msgList.length) usedIndices = [];
            const available = [];
            for (let i = 0; i < msgList.length; i++) {
                if (!usedIndices.includes(i)) available.push(i);
            }
            if (available.length === 0) {
                usedIndices = [];
                return msgList[Math.floor(Math.random() * msgList.length)];
            }
            const idx = available[Math.floor(Math.random() * available.length)];
            usedIndices.push(idx);
            return msgList[idx];
        }

        function applyCharacterState(stateKey) {
            const state = getCharacterState(stateKey);
            if (!state) return;
            vesehImage.src = state.image;

            if (stateKey === 'SLEEPING') {
                isSleeping = true;
                vesehImage.classList.add('sleeping');
                chatBubble.classList.add('hidden');
                return;
            }

            isSleeping = false;
            vesehImage.classList.remove('sleeping');
            chatBubble.classList.remove('hidden');
            const msg = getRandomCharacterMessage(stateKey);
            chatBubble.textContent = msg;
            chatBubble.classList.remove('fade-float');
            void chatBubble.offsetWidth;
            chatBubble.classList.add('fade-float');
            characterState = stateKey;
        }

        function switchCharacterState() {
            stateCounter++;

            // بعد از 2 حالت غیرخواب، برو به خواب
            if (stateCounter >= 2 && !isSleeping) {
                stateCounter = 0;
                applyCharacterState('SLEEPING');
                // تایمر برای بیدار شدن بعد از 30 ثانیه
                clearTimeout(characterTimer);
                characterTimer = setTimeout(() => {
                    if (isSleeping) {
                        wakeUpCharacter();
                    }
                }, 30000);
                return;
            }

            // اگر خواب است، کاری نکن
            if (isSleeping) return;

            // انتخاب حالت تصادفی غیرخواب
            const available = NON_SLEEP_KEYS.filter(k => k !== characterState);
            if (available.length === 0) {
                applyCharacterState('WELCOME');
                return;
            }
            const newKey = available[Math.floor(Math.random() * available.length)];
            applyCharacterState(newKey);

            // ریست تایمر
            clearTimeout(characterTimer);
            characterTimer = setTimeout(() => {
                switchCharacterState();
            }, 30000);
        }

        function wakeUpCharacter() {
            if (!isSleeping) return;
            stateCounter = 0;
            const newKey = NON_SLEEP_KEYS[Math.floor(Math.random() * NON_SLEEP_KEYS.length)];
            applyCharacterState(newKey);
            clearTimeout(characterTimer);
            characterTimer = setTimeout(() => {
                switchCharacterState();
            }, 30000);
        }

                const icon = getTagIcon(tag);

                chip.innerHTML = `
                    <span class="fc-icon">${icon}</span>

                chip.onclick = () => {
                    activeFilter = activeFilter === tag ? null : tag;
                    renderFilterGrid();
                    updateFilterBadge();
                    applyFilters();
                    closeFilter();
                    if (activeFilter) {
                        applyCharacterState('INTERESTING');

                        applyCharacterState('WELCOME');

        // ============================================================
        // RENDER RESULTS
        // ============================================================
        function renderResults() {
            let results = [...expressions];

            if (activeFilter) {
                results = results.filter(e => e.tags.includes(activeFilter));
            }

            const query = searchQuery.trim().toLowerCase();
            if (query) {
                results = results.filter(e =>
                    e.eng.toLowerCase().includes(query) ||
                    e.fa.includes(query) ||
                    e.pron.toLowerCase().includes(query) ||
                    e.tags.some(t => t.toLowerCase().includes(query))
                );
                if (results.length > 0) {
                    applyCharacterState('THINKING');
                }
            }

            const resultLabel = getLocalizedText({ fa: 'نتیجه', en: 'result' });
            resultCount.textContent = `${results.length} ${resultLabel}`;

            if (results.length === 0) {
                contentContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <div class="empty-title">${getLocalizedText({ fa: 'چیزی پیدا نشد', en: 'Nothing found' })}</div>
                        <div class="empty-desc">${getLocalizedText({ fa: 'سعی کن با کلمات دیگری جستجو کنی ✨', en: 'Try different keywords ✨' })}</div>
                    </div>
                `;
                return;
            }

            let html = `<div class="cards-grid">`;
            results.forEach(expr => {
                const isBookmarked = bookmarks.some(b => b.eng === expr.eng);
                const primaryTag = getPrimaryTag(expr.tags);
                html += `
                    <div class="expr-card" data-primary-tag="${primaryTag}">
                        <div class="expr-top">
                            <div>
                                <div class="expr-eng">${expr.eng}</div>
                                <div class="expr-pron">${expr.pron}</div>
                                <div class="expr-fa">${expr.fa}</div>
                                <div class="expr-tags">${expr.tags.map(t => `<span class="expr-tag"><span class="tag-icon">${getTagIcon(t)}</span> ${getLocalizedTag(t)}</span>`).join('')}</div>
                            </div>
                            <div class="expr-actions">
                                <button class="action-btn play-btn" data-eng="${expr.eng}"><i class="fas fa-play"></i></button>
                                <button class="action-btn record-select-btn" data-eng="${expr.eng}" data-fa="${expr.fa}"><i class="fas fa-microphone"></i></button>
                                <button class="action-btn bookmark-btn ${isBookmarked ? 'saved' : ''}" data-eng="${expr.eng}"><i class="fas fa-bookmark"></i></button>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            contentContainer.innerHTML = html;

            // Play
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const eng = btn.dataset.eng;
                    const expr = expressions.find(e => e.eng === eng);
                    if (expr) {
                        speak(expr.eng);
                        applyCharacterState('SURPRISED');
                    }
                    btn.classList.add('playing');
                    setTimeout(() => btn.classList.remove('playing'), 800);
                };
            });

            // Record select
            document.querySelectorAll('.record-select-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const eng = btn.dataset.eng;
                    const fa = btn.dataset.fa;
                    selectedPhrase = { eng, fa };
                    selectedLabel.textContent = `“${eng.substring(0, 20)}...”`;
                    document.querySelectorAll('.record-select-btn').forEach(b => b.classList.remove('record-active'));
                    btn.classList.add('record-active');
                    applyCharacterState('STUDYING');
                };
            });

            // Bookmark
            document.querySelectorAll('.bookmark-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const eng = btn.dataset.eng;
                    const expr = expressions.find(e => e.eng === eng);
                    if (!expr) return;
                    const idx = bookmarks.findIndex(b => b.eng === eng);
                    if (idx > -1) {
                        bookmarks.splice(idx, 1);
                        btn.classList.remove('saved');
                    } else {
                        bookmarks.push({ ...expr });
                        btn.classList.add('saved');
                        applyCharacterState('SUPER_HAPPY');
                    }
                    updateStats();
                };
            });

            updateStats();
        }

        // ============================================================
        // MICROPHONE
        // ============================================================
        let recognition = null;

        function initSpeech() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                micText.textContent = 'مرورگر شما از جستجوی صوتی پشتیبانی نمی‌کند.';
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = currentLanguage === 'fa' ? 'fa-IR' : 'en-US';
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                micText.textContent = getLocalizedText({ fa: 'در حال گوش دادن...', en: 'Listening...' });
                micResult.textContent = '';
                applyCharacterState('STUDYING');
            };

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        micResult.textContent = transcript;
                        searchInput.value = transcript;
                        searchQuery = transcript;
                        showResults();
                        applyCharacterState('SURPRISED');
                        setTimeout(() => {
                            micOverlay.classList.remove('open');
                            isMicActive = false;
                        }, 500);
                    }
                }
                micResult.textContent = transcript;
            };

            recognition.onerror = () => {
                micText.textContent = getLocalizedText({ fa: 'خطا در تشخیص صدا', en: 'Speech error' });
                setTimeout(() => {
                    micOverlay.classList.remove('open');
                    isMicActive = false;
                }, 800);
            };

            recognition.onend = () => {
                if (micOverlay.classList.contains('open')) {
                    micOverlay.classList.remove('open');
                    isMicActive = false;
                }
            };
        }

        function startMic() {
            if (isMicActive) return;
            if (!recognition) initSpeech();
            if (!recognition) {
                alert('مرورگر شما از جستجوی صوتی پشتیبانی نمی‌کند.');
                return;
            }
            recognition.lang = currentLanguage === 'fa' ? 'fa-IR' : 'en-US';
            micOverlay.classList.add('open');
            isMicActive = true;
            micResult.textContent = '';
            micText.textContent = getLocalizedText({ fa: 'برای جستجوی صوتی صحبت کنید...', en: 'Speak for voice search...' });
            try { recognition.start(); } catch (e) {}
        }

        // ============================================================
        // RECORDING
        // ============================================================
        async function startRecording() {
            const selectMsg = getLocalizedText({ fa: 'لطفاً ابتدا یک عبارت را با کلیک روی دکمه میکروفون انتخاب کنید.',
                en: 'Please select a phrase first by clicking the microphone button.' });
            if (!selectedPhrase) {
                alert(selectMsg);
                return;
            }
            if (isRecording) return;

            audioChunks = [];
            recordedBlob = null;
            playRecBtn.disabled = true;
            saveRecBtn.disabled = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaStream = stream;
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    recordedBlob = blob;
                    const url = URL.createObjectURL(blob);
                    recAudio.src = url;
                    playRecBtn.disabled = false;
                    saveRecBtn.disabled = false;
                    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                    isRecording = false;
                    startRecBtn.disabled = false;
                    startRecBtn.classList.remove('recording');
                    stopRecBtn.disabled = true;
                    visualizer.style.display = 'none';
                    applyCharacterState('SUPER_HAPPY');
                };
                mediaRecorder.start();
                isRecording = true;
                startRecBtn.disabled = true;
                startRecBtn.classList.add('recording');
                stopRecBtn.disabled = false;
                visualizer.style.display = 'inline-flex';
                applyCharacterState('STUDYING');
            } catch (e) {
                const msg = getLocalizedText({ fa: 'دسترسی به میکروفون امکان‌پذیر نیست.', en: 'Microphone access denied.' });
                alert(msg);
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        function playRecording() {
            if (recAudio.src) {
                recAudio.play();
                applyCharacterState('SURPRISED');
            }
        }

        function saveRecording() {
            const savedMsg = getLocalizedText({ fa: '💾 فایل صوتی ذخیره شد!', en: '💾 Audio saved!' });
            if (recordedBlob && selectedPhrase) {
                const fileName =
                    `veseh-${selectedPhrase.eng.replace(/\s/g, '_')}-${new Date().toISOString().slice(0,10)}.webm`;
                const url = URL.createObjectURL(recordedBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                a.click();
                URL.revokeObjectURL(url);
                alert(savedMsg);
                applyCharacterState('SUPER_HAPPY');
            }
        }

                const desc = getLocalizedText({ fa: 'همراه شخصی زبان. طراحی شده برای زندگی روزمره با انگلیسی.', en: 'Personal language companion. Designed for daily life with English.' });
                contentContainer.innerHTML = `
                    <div style="padding:0.8rem 0;">
                        <h2 style="font-size:1.1rem; margin-bottom:0.8rem;">⚙️ ${getLocalizedText({ fa: 'تنظیمات', en: 'Settings' })}</h2>
                        <div style="display:flex; flex-direction:column; gap:0.6rem;">
                            <div style="display:flex; justify-content:space-between; align-items:center; padding:0.4rem 0; border-bottom:1px solid var(--border);">
                                <span>🌙 ${themeLabel}</span>
                                <button class="action-btn" onclick="document.getElementById('themeBtn').click()" style="padding:0.2rem 0.8rem; border-radius:2rem; background:rgba(167,139,250,0.04); border:1px solid var(--border); color:var(--text); cursor:pointer; font-size:0.7rem;">
                                    ${toggleLabel}
                                </button>
                            </div>
                            <div style="display:flex; justify-content:space-between; align-items:center; padding:0.4rem 0; border-bottom:1px solid var(--border);">
                                <span>🌐 ${languageLabel}</span>
                                <button class="action-btn" onclick="document.getElementById('langBtn').click()" style="padding:0.2rem 0.8rem; border-radius:2rem; background:rgba(167,139,250,0.04); border:1px solid var(--border); color:var(--text); cursor:pointer; font-size:0.7rem;">
                                    ${currentLanguage === 'fa' ? 'فارسی' : 'English'}
                                </button>
                            </div>
                        </div>
                        <div style="margin-top:1rem; padding:0.8rem; background:rgba(255,255,255,0.02); border-radius:var(--radius-md); border:1px solid var(--border);">
                            <div style="font-weight:600; margin-bottom:0.2rem; font-size:0.8rem;">${aboutVeseh}</div>
                            <div style="font-size:0.7rem; color:var(--text-sec); line-height:1.6;">
                                ${desc}
                                <br />نسخه ۱.۰
                            </div>
                        </div>
                    </div>
                `;
                resultsContainer.classList.add('visible');
                backBtnWrapper.classList.add('visible');
                closeSidebarPanel();
                return;
            }

            if (page === 'about') {
                const aboutVeseh = getLocalizedText({ fa: 'درباره VESEH', en: 'About VESEH' });
                const desc = getLocalizedText({ fa: 'همراه شخصی زبان. طراحی شده برای زندگی روزمره با انگلیسی.', en: 'Personal language companion. Designed for daily life with English.' });
                contentContainer.innerHTML = `
                    <div style="padding:1.5rem 0; text-align:center;">
                        <div style="font-size:2.5rem; margin-bottom:0.8rem;">✨</div>
                        <h2 style="font-size:1.2rem; font-weight:800; margin-bottom:0.3rem;">VESEH</h2>
                        <div style="color:var(--text-sec); font-size:0.85rem; max-width:350px; margin:0 auto; line-height:1.8;">
                            ${desc}
                            <br /><br />
                            <span style="font-size:0.7rem; opacity:0.5;">نسخه ۱.۰</span>
                        </div>
                    </div>
                `;
                resultsContainer.classList.add('visible');
                backBtnWrapper.classList.add('visible');
                closeSidebarPanel();
                return;
            }

            closeSidebarPanel();
        }

        // ============================================================
        // SIDEBAR CONTROL
        // ============================================================
        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('active');
        }

        function closeSidebarPanel() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('active');
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        menuBtn.onclick = openSidebar;
        closeSidebar.onclick = closeSidebarPanel;
        sidebarOverlay.onclick = closeSidebarPanel;

        themeBtn.onclick = toggleTheme;
        langBtn.onclick = toggleLanguage;

        filterBtn.onclick = (e) => {
            e.stopPropagation();
            toggleFilter();
            if (isFilterOpen) applyCharacterState('THINKING');
        };

        document.addEventListener('click', (e) => {
            const wrapper = document.querySelector('.hero-search-wrapper');
            if (isFilterOpen && wrapper && !wrapper.contains(e.target)) {
                closeFilter();
            }
        });

        micBtn.onclick = startMic;
        micClose.onclick = () => {
            micOverlay.classList.remove('open');
            isMicActive = false;
            if (recognition) recognition.stop();
        };

        searchInput.addEventListener('input', () => {
            searchQuery = searchInput.value;
            if (searchQuery.trim()) {
                showResults();
            } else {
                hideResults();
                // ریست فیلتر هم
                activeFilter = null;
                renderFilterGrid();
                updateFilterBadge();
            }
        });

        clearBtn.onclick = () => {
            searchInput.value = '';
            searchQuery = '';
            activeFilter = null;
            renderFilterGrid();
            updateFilterBadge();
            hideResults();
            applyCharacterState('WELCOME');
        };

        backBtn.onclick = goBack;

        document.querySelectorAll('.sidebar-nav .nav-item').forEach(item => {
            item.onclick = () => {
                const page = item.dataset.page;
                navigateTo(page);
            };
        });

        randomPlayBtn.onclick = () => {
            const eng = randomEng.textContent;
            if (eng && eng !== '—') {
                speak(eng);
                applyCharacterState('SURPRISED');
            }
        };

        startRecBtn.onclick = startRecording;
        stopRecBtn.onclick = stopRecording;
        playRecBtn.onclick = playRecording;
        saveRecBtn.onclick = saveRecording;

        // ===== کلیک روی کاراکتر =====
        vesehImage.onclick = () => {
            if (isSleeping) {
                wakeUpCharacter();
            } else {
                switchCharacterState();
            }
        };

        // ============================================================
        // INIT
        // ============================================================
        renderFilterGrid();
        updateFilterBadge();
        updateStats();
        hideResults();
        initSpeech();
        startCharacterCycle();
        updateTotalInfo();

        console.log('✨ VESEH v1.0 — با کاراکتر خواب و بیدار، وسط صفحه');
        console.log(`📚 ${expressions.length} چانک بارگذاری شد`);
        console.log(`🏷️ ${getAllTags().length} تگ`);
        console.log('🧚 کاراکتر: ۲ حالت ۳۰ ثانیه سپس خواب');
    </script>
</body>
</html>
