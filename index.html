<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>VESEH ✦ موتور جستجوی زندگی روزمره</title>

    <link rel="icon" type="image/png" sizes="32x32" href="https://uploadkon.ir/uploads/cc0505_26ChatGPT-Image-Jul-6-2026-12-58-54-AM.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="https://uploadkon.ir/uploads/cc0505_26ChatGPT-Image-Jul-6-2026-12-58-54-AM.png" />
    <link rel="shortcut icon" href="https://uploadkon.ir/uploads/cc0505_26ChatGPT-Image-Jul-6-2026-12-58-54-AM.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://uploadkon.ir/uploads/cc0505_26ChatGPT-Image-Jul-6-2026-12-58-54-AM.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
        /* ===== ROOT ===== */
        :root {
            --deep-navy: #0B0720;
            --soft-purple: #7C3AED;
            --magical-blue: #38BDF8;
            --soft-pink: #F0ABFC;
            --indigo: #4F46E5;
            --light-bg: #F5F0FF;
            --light-text: #1A0D2E;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.05);
            --text: #FFFFFF;
            --text-sec: rgba(255, 255, 255, 0.55);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            --shadow-hover: 0 25px 70px rgba(124, 58, 237, 0.12);
            --radius-lg: 28px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body.light-mode {
            --deep-navy: #F5F0FF;
            --glass: rgba(255, 255, 255, 0.5);
            --border: rgba(124, 58, 237, 0.06);
            --text: #1A0D2E;
            --text-sec: #4A2A6A;
            --shadow: 0 20px 60px rgba(124, 58, 237, 0.04);
            --shadow-hover: 0 25px 70px rgba(124, 58, 237, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--deep-navy);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(155, 107, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--soft-purple), var(--magical-blue), var(--soft-pink));
            border-radius: 10px;
        }

        /* ===== MAGICAL BG ===== */
        .magic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.10) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(79, 70, 229, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(56, 189, 248, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 70%, rgba(240, 171, 252, 0.05) 0%, transparent 50%),
                var(--deep-navy);
            transition: background 0.4s ease;
        }
        .sparkle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--magical-blue);
            border-radius: 50%;
            box-shadow: 0 0 8px 3px rgba(56, 189, 248, 0.10);
            animation: floatUp linear infinite;
            opacity: 0;
        }
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(240, 171, 252, 0.04), rgba(56, 189, 248, 0.01));
            border: 1px solid rgba(240, 171, 252, 0.02);
            animation: floatUpBubble linear infinite;
            opacity: 0;
            backdrop-filter: blur(2px);
        }
        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-10vh) scale(1.1);
                opacity: 0;
            }
        }
        @keyframes floatUpBubble {
            0% {
                transform: translateY(100vh) scale(0.3) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.10;
            }
            85% {
                opacity: 0.10;
            }
            100% {
                transform: translateY(-10vh) scale(1) rotate(720deg);
                opacity: 0;
            }
        }

        /* ===== HEADER ===== */
        .header {
            width: 100%;
            background: rgba(11, 7, 32, 0.50);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.3s ease;
            min-height: 52px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .menu-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--text);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:hover {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            transform: scale(1.04);
        }
        .logo-img {
            height: 32px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 2px 12px rgba(167, 139, 250, 0.15));
            transition: all 0.3s ease;
        }
        .logo-img:hover {
            transform: scale(1.04);
        }
        .header-right {
            display: flex;
            gap: 0.3rem;
            align-items: center;
        }
        .icon-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-sec);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            color: var(--text);
            transform: scale(1.04);
        }
        .lang-btn {
            font-weight: 700;
            font-size: 0.6rem;
            width: 38px;
            letter-spacing: 0.3px;
        }

        /* ===== MAIN WRAPPER ===== */
        .main-wrapper {
            width: 100%;
            max-width: 600px;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            position: relative;
            z-index: 1;
        }

        /* ===== VESEH CHARACTER ===== */
        .veseh-character-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 0.8rem;
            width: 100%;
            position: relative;
        }
        .veseh-character-wrapper .veseh-img {
            height: 110px;
            width: 110px;
            object-fit: contain;
            filter: drop-shadow(0 6px 30px rgba(167, 139, 250, 0.15));
            transition: transform 0.3s ease;
            cursor: pointer;
            background: transparent;
            border: none;
            padding: 0;
            border-radius: 0;
        }
        .veseh-character-wrapper .veseh-img:hover {
            transform: scale(1.05) rotate(-2deg);
        }
        .veseh-character-wrapper .veseh-img.sleeping {
            filter: drop-shadow(0 6px 30px rgba(167, 139, 250, 0.05)) grayscale(0.2);
        }
        .veseh-character-wrapper .chat-bubble-mini {
            position: absolute;
            top: -18px;
            right: calc(50% + 70px);
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px 20px 4px 20px;
            padding: 0.35rem 1rem;
            font-size: 0.75rem;
            color: var(--text);
            white-space: nowrap;
            box-shadow: var(--shadow);
            animation: floatBubble 2.5s ease-in-out infinite;
            border: 1px solid rgba(56, 189, 248, 0.06);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 2;
        }
        .veseh-character-wrapper .chat-bubble-mini.hidden {
            display: none;
        }
        @keyframes floatBubble {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }
        .veseh-character-wrapper .chat-bubble-mini::after {
            content: '';
            position: absolute;
            bottom: -6px;
            right: 14px;
            width: 10px;
            height: 10px;
            background: var(--glass);
            border-radius: 0 0 8px 0;
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(12px);
        }

        @media(max-width:640px) {
            .veseh-character-wrapper .chat-bubble-mini {
                right: calc(50% + 40px);
                font-size: 0.6rem;
                padding: 0.2rem 0.7rem;
                max-width: 130px;
                top: -14px;
            }
            .veseh-character-wrapper .veseh-img {
                height: 85px;
                width: 85px;
            }
            .main-wrapper {
                min-height: 60vh;
                padding: 0 0.6rem;
            }
        }

        /* ===== SEARCH ===== */
        .hero-search-wrapper {
            width: 100%;
            max-width: 580px;
            position: relative;
        }

        .hero-search-box {
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 0.2rem 0.2rem 0.2rem 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            position: relative;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.04), rgba(79, 70, 229, 0.03), rgba(56, 189, 248, 0.02));
        }
        .hero-search-box:focus-within {
            border-color: var(--magical-blue);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.04), var(--shadow);
        }
        .hero-search-box .search-icon {
            color: var(--text-sec);
            font-size: 0.8rem;
            flex-shrink: 0;
        }
        .hero-search-box .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.5rem 0.1rem;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            font-family: inherit;
            min-height: 44px;
        }
        .hero-search-box .search-input::placeholder {
            color: rgba(255, 255, 255, 0.15);
        }
        .hero-search-box .search-actions {
            display: flex;
            gap: 0.15rem;
            align-items: center;
            flex-shrink: 0;
        }
        .hero-search-box .search-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 3rem;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sec);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
        }
        .hero-search-box .search-btn:hover {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            color: var(--text);
            transform: scale(1.04);
        }
        .hero-search-box .search-btn.mic-active {
            color: var(--magical-blue);
            border-color: var(--magical-blue);
            animation: pulseMic 1s infinite;
        }
        .hero-search-box .search-btn.clear-btn {
            font-size: 0.75rem;
            width: 36px;
            padding: 0;
        }
        .hero-search-box .search-btn.filter-btn {
            font-size: 0.7rem;
            width: auto;
            padding: 0 0.7rem;
            gap: 0.2rem;
            display: flex;
            align-items: center;
            background: rgba(124, 58, 237, 0.04);
            border-color: rgba(124, 58, 237, 0.06);
        }
        .hero-search-box .search-btn.filter-btn .filter-badge {
            font-size: 0.45rem;
            background: linear-gradient(135deg, var(--soft-purple), var(--magical-blue));
            color: white;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .hero-search-box .search-btn.filter-btn.active {
            border-color: var(--magical-blue);
            color: var(--magical-blue);
        }

        @keyframes pulseMic {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        /* ===== BACK BUTTON ===== */
        .back-btn-wrapper {
            width: 100%;
            max-width: 580px;
            display: none;
            margin-bottom: 0.6rem;
            justify-content: flex-start;
        }
        .back-btn-wrapper.visible {
            display: flex;
        }
        .back-btn-wrapper .back-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.3rem 1rem;
            color: var(--text-sec);
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: inherit;
        }
        .back-btn-wrapper .back-btn:hover {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            color: var(--text);
            transform: scale(1.04);
        }

        /* ===== FILTER DROPDOWN ===== */
        .filter-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: rgba(11, 7, 32, 0.90);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.6rem 0.8rem;
            display: none;
            z-index: 95;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: var(--shadow);
            background: linear-gradient(135deg, rgba(11, 7, 32, 0.92), rgba(79, 70, 229, 0.05));
        }
        .filter-dropdown.open {
            display: block;
            animation: fadeInDown 0.25s ease;
        }
        .filter-dropdown .filter-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }
        .filter-dropdown .filter-chip {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.15rem 0.7rem;
            font-size: 0.65rem;
            color: var(--text-sec);
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            border-color: rgba(56, 189, 248, 0.04);
        }
        .filter-dropdown .filter-chip:hover {
            background: rgba(167, 139, 250, 0.04);
            border-color: var(--soft-purple);
            color: var(--text);
            transform: scale(1.03);
        }
        .filter-dropdown .filter-chip.active {
            background: rgba(167, 139, 250, 0.08);
            border-color: var(--magical-blue);
            color: var(--text);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.02);
        }
        .filter-dropdown .filter-chip .fc-count {
            font-size: 0.45rem;
            opacity: 0.4;
        }
        .filter-dropdown .filter-chip .fc-icon {
            font-size: 0.55rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== RESULTS ===== */
        .results-container {
            width: 100%;
            max-width: 580px;
            margin-top: 0.8rem;
            display: none;
            animation: fadeInUp 0.3s ease;
        }
        .results-container.visible {
            display: block;
        }
        .results-container .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            padding: 0 0.2rem;
        }
        .results-container .results-header .count {
            font-size: 0.75rem;
            color: var(--text-sec);
            opacity: 0.5;
        }

        /* ===== EXPRESSION CARDS ===== */
        .cards-grid {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .expr-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.8rem 1rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.02), rgba(79, 70, 229, 0.01));
        }
        .expr-card:hover {
            transform: translateY(-3px);
            border-color: rgba(167, 139, 250, 0.12);
            box-shadow: var(--shadow-hover);
        }
        .expr-card[data-primary-tag="home"] {
            border-left: 3px solid #7C3AED;
        }
        .expr-card[data-primary-tag="kitchen"] {
            border-left: 3px solid #F59E0B;
        }
        .expr-card[data-primary-tag="bathroom"] {
            border-left: 3px solid #38BDF8;
        }
        .expr-card[data-primary-tag="sleep"] {
            border-left: 3px solid #6366F1;
        }
        .expr-card[data-primary-tag="food"] {
            border-left: 3px solid #EF4444;
        }
        .expr-card[data-primary-tag="work"] {
            border-left: 3px solid #8B5CF6;
        }
        .expr-card[data-primary-tag="health"] {
            border-left: 3px solid #22D3EE;
        }
        .expr-card[data-primary-tag="emotion"] {
            border-left: 3px solid #F472B6;
        }
        .expr-card[data-primary-tag="study"] {
            border-left: 3px solid #34D399;
        }
        .expr-card[data-primary-tag="laptop"] {
            border-left: 3px solid #60A5FA;
        }
        .expr-card[data-primary-tag="phone"] {
            border-left: 3px solid #A78BFA;
        }
        .expr-card[data-primary-tag="cleaning"] {
            border-left: 3px solid #93C5FD;
        }
        .expr-card[data-primary-tag="laundry"] {
            border-left: 3px solid #818CF8;
        }
        .expr-card[data-primary-tag="greeting"] {
            border-left: 3px solid #34D399;
        }
        .expr-card[data-primary-tag="friend"] {
            border-left: 3px solid #F59E0B;
        }
        .expr-card[data-primary-tag="casual"] {
            border-left: 3px solid #E2E8F0;
        }
        .expr-card[data-primary-tag="idiom"] {
            border-left: 3px solid #F472B6;
        }
        .expr-card[data-primary-tag="tired"] {
            border-left: 3px solid #9CA3AF;
        }
        .expr-card[data-primary-tag="morning"] {
            border-left: 3px solid #FCD34D;
        }
        .expr-card[data-primary-tag="tea"] {
            border-left: 3px solid #D97706;
        }
        .expr-card[data-primary-tag="drink"] {
            border-left: 3px solid #60A5FA;
        }
        .expr-card[data-primary-tag="device"] {
            border-left: 3px solid #8B5CF6;
        }
        .expr-card[data-primary-tag="chore"] {

        }

        .expr-card[data-primary-tag="sad"] {

        }

        }

        }

        }

        }
        .expr-card[data-primary-tag="urgent"] {
            border-left: 3px solid #EF4444;
        }
        .expr-card[data-primary-tag="hygiene"] {
            border-left: 3px solid #38BDF8;
        }
        .expr-card[data-primary-tag="meeting"] {
            border-left: 3px solid #8B5CF6;
        }
        .expr-card[data-primary-tag="business"] {
            border-left: 3px solid #7C3AED;
        }
        .expr-card[data-primary-tag="agreement"] {
            border-left: 3px solid #34D399;
        }
        .expr-card[data-primary-tag="opinion"] {
            border-left: 3px solid #60A5FA;
        }
        .expr-card[data-primary-tag="pain"] {
            border-left: 3px solid #EF4444;
        }
        .expr-card[data-primary-tag="doctor"] {
            border-left: 3px solid #22D3EE;
        }
        .expr-card[data-primary-tag="emergency"] {
            border-left: 3px solid #EF4444;
        }
        .expr-card[data-primary-tag="symptom"] {

        .expr-card .action-btn.saved {
            color: #F59E0B;

        .expr-card .action-btn.playing {

            0%,
            100% {

        /* ===== EMPTY STATE ===== */
        .empty-state {

            padding: 2rem 1rem;

        .empty-state .empty-desc {

            color: var(--text-sec);
            margin-top: 0.2rem;
        }

        /* ===== RECORD PANEL ===== */
        .record-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(11, 7, 32, 0.85);
            backdrop-filter: blur(24px);

        .record-panel .record-label {
            font-size: 0.6rem;
            color: var(--text-sec);

            align-items: center;

            color: var(--text);

            max-width: 90px;

            text-overflow: ellipsis;

        .record-panel .rec-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);

            padding: 0.2rem 0.7rem;

            font-size: 0.6rem;

            opacity: 0.3;

        }
        .record-panel .rec-btn.recording {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.12);
            color: #EF4444;
            animation: pulseRec 1.5s infinite;
        }
        @keyframes pulseRec {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.05);
            }
            50% {
                box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
            }
        }
        .record-panel .visualizer {
            display: inline-flex;
            gap: 2px;
            align-items: center;
            height: 18px;
        }
        .record-panel .visualizer span {
            width: 2px;
            height: 6px;
            background: var(--magical-blue);
            border-radius: 2px;
            animation: wave 0.6s infinite;
        }
        .record-panel .visualizer span:nth-child(2) {
            animation-delay: 0.1s;
        }
        .record-panel .visualizer span:nth-child(3) {
            animation-delay: 0.2s;
        }
        .record-panel .visualizer span:nth-child(4) {
            animation-delay: 0.3s;
        }
        .record-panel .visualizer span:nth-child(5) {
            animation-delay: 0.4s;
        }
        .record-panel .visualizer span:nth-child(6) {
            animation-delay: 0.5s;
        }
        @keyframes wave {
            0%,
            100% {
                height: 5px;
            }
            50% {
                height: 14px;
            }
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            right: -100%;
            width: 340px;
            max-width: 88vw;
            height: 100%;
            background: rgba(11, 7, 32, 0.92);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-left: 1px solid var(--border);
            z-index: 1000;
            transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1);

        .sidebar.open {
            right: 0;
        }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            backdrop-filter: blur(3px);
            z-index: 999;
            display: none;

        .sidebar-overlay.active {
            display: block;
        }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            border-bottom: 1px solid var(--border);

            border-bottom-color: rgba(56, 189, 248, 0.04);

        .sidebar-header .brand {
            font-weight: 800;
            font-size: 1.2rem;

            -webkit-text-fill-color: transparent;

        .sidebar-header .brand i {
            -webkit-text-fill-color: initial;
            color: var(--soft-purple);
        }
        .sidebar-close {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);

            border-radius: var(--radius-sm);
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-sec);
            transition: 0.3s;

        .sidebar-close:hover {
            color: var(--text);
            border-color: var(--soft-purple);
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.5rem 0.8rem;
            border-radius: var(--radius-sm);
            color: var(--text-sec);
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: transparent;
            width: 100%;
            font-size: 0.85rem;
            font-family: inherit;
            text-align: right;
            text-decoration: none;
        }
        .sidebar-nav .nav-item:hover {
            background: rgba(167, 139, 250, 0.04);
            color: var(--text);
            transform: translateX(-3px);
        }
        .sidebar-nav .nav-item.active {
            background: rgba(167, 139, 250, 0.06);

            font-size: 1rem;
        }
        .sidebar-divider {

            border-top-color: rgba(56, 189, 248, 0.04);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.3rem;
            margin-top: 0.4rem;
        }
        .stat-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.3rem 0.2rem;
            text-align: center;
            border-color: rgba(56, 189, 248, 0.04);

        .stat-box .stat-number {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--magical-blue);
        }
        .stat-box .stat-label {
            font-size: 0.45rem;
            color: var(--text-sec);
        }

        /* ===== MIC OVERLAY ===== */
        .mic-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 7, 32, 0.75);
            backdrop-filter: blur(24px);

            align-items: center;
            justify-content: center;

        }
        .mic-overlay .mic-icon {
            font-size: 4rem;
            color: var(--magical-blue);

        }
        .mic-overlay .mic-text {
            font-size: 1.1rem;
            color: var(--text-sec);
        }
        .mic-overlay .mic-result {
            font-size: 1.2rem;
            color: var(--text);
            font-weight: 500;
            background: rgba(255, 255, 255, 0.02);
            padding: 0.5rem 1.5rem;
            border-radius: 3rem;
            border: 1px solid var(--border);
        }
        .mic-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-sec);
            background: none;
            border: none;
            padding: 0.5rem;
        }
        .mic-close:hover {
            color: var(--text);
        }

        /* ===== RESPONSIVE ===== */
        @media(max-width:640px) {
            .header {
                padding: 0.3rem 0.6rem;
                min-height: 46px;
            }
            .menu-btn {
                width: 32px;
                height: 32px;
                font-size: 0.85rem;
            }
            .logo-img {
                height: 26px;
            }
            .icon-btn {
                width: 30px;
                height: 30px;
                font-size: 0.7rem;
            }

                width: 34px;

            }

                font-size: 0.7rem;
            }
            .hero-search-box .search-btn.clear-btn {

            .results-container {

            }
            .expr-card {

            .expr-card .expr-eng {
                font-size: 0.85rem;
            }
            .expr-card .expr-fa {
                font-size: 0.7rem;
            }
            .expr-card .action-btn {
                width: 28px;
                height: 28px;
                font-size: 0.65rem;

            .record-panel {

                padding: 0.15rem 0.6rem;

            .record-panel .record-label {

            .sidebar {

                padding: 0.8rem;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .mic-overlay .mic-icon {
                font-size: 3rem;
            }
            .mic-overlay .mic-text {
                font-size: 0.9rem;
            }
            .back-btn-wrapper .back-btn {
                font-size: 0.6rem;
                padding: 0.2rem 0.8rem;
            }
        }

        @media(min-width:768px) {

                width: 380px;
                padding: 1.5rem;
            }

                height: 130px;
                width: 130px;

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

        function getCharacterState(key) {

        function getRandomCharacterMessage(stateKey) {
            const state = getCharacterState(stateKey);
            if (!state || !state.messages) return '👋 Hello!';
            const msgList = state.messages[currentLanguage] || state.messages.fa;
            if (!msgList || msgList.length === 0) return '👋 Hello!';
            if (msgList.length === 1) return msgList[0];
            if (usedIndices.length >= msgList.length) usedIndices = [];
            const available = [];
            for (let i = 0; i < msgList.length; i++) {
                if (!usedIndices.includes(i)) available.push(i);
            }
            if (available.length === 0) {
                usedIndices = [];
                return msgList[Math.floor(Math.random() * msgList.length)];
            }
            const idx = available[Math.floor(Math.random() * available.length)];
            usedIndices.push(idx);
            return msgList[idx];
        }

        function applyCharacterState(stateKey) {
            const state = getCharacterState(stateKey);
            if (!state) return;
            vesehImage.src = state.image;

            if (stateKey === 'SLEEPING') {
                isSleeping = true;
                vesehImage.classList.add('sleeping');
                chatBubble.classList.add('hidden');
                return;
            }

            isSleeping = false;
            vesehImage.classList.remove('sleeping');
            chatBubble.classList.remove('hidden');
            const msg = getRandomCharacterMessage(stateKey);
            chatBubble.textContent = msg;
            chatBubble.classList.remove('fade-float');
            void chatBubble.offsetWidth;
            chatBubble.classList.add('fade-float');
            characterState = stateKey;
        }

        function switchCharacterState() {
            stateCounter++;

            if (stateCounter >= 2 && !isSleeping) {
                stateCounter = 0;
                applyCharacterState('SLEEPING');
                clearTimeout(characterTimer);
                characterTimer = setTimeout(() => {
                    if (isSleeping) {
                        wakeUpCharacter();
                    }
                }, 30000);
                return;
            }

            if (isSleeping) return;

            const available = NON_SLEEP_KEYS.filter(k => k !== characterState);
            if (available.length === 0) {
                applyCharacterState('WELCOME');
                return;
            }
            const newKey = available[Math.floor(Math.random() * available.length)];
            applyCharacterState(newKey);

            clearTimeout(characterTimer);
            characterTimer = setTimeout(() => {
                switchCharacterState();
            }, 30000);
        }

        function wakeUpCharacter() {
            if (!isSleeping) return;
            stateCounter = 0;
            const newKey = NON_SLEEP_KEYS[Math.floor(Math.random() * NON_SLEEP_KEYS.length)];
            applyCharacterState(newKey);
            clearTimeout(characterTimer);
            characterTimer = setTimeout(() => {
                switchCharacterState();
            }, 30000);
        }

        function startCharacterCycle() {
            applyCharacterState('WELCOME');
            stateCounter = 0;
            clearTimeout(characterTimer);
            characterTimer = setTimeout(() => {
                switchCharacterState();
            }, 30000);
        }

            `;
            allTags.forEach(tag => {
                const count = getTagCount(tag);
                const icon = getTagIcon(tag);
                const label = getLocalizedTag(tag);
                const chip = document.createElement('button');
                chip.className = `filter-chip ${activeFilter === tag ? 'active' : ''}`;
                chip.dataset.tag = tag;
                chip.innerHTML = `
                    <span class="fc-icon">${icon}</span>
                    ${label}
                    <span class="fc-count">(${count})</span>
                `;
                chip.onclick = () => {
                    activeFilter = activeFilter === tag ? null : tag;
                    renderFilterGrid();
                    updateFilterBadge();
                    applyFilters();
                    closeFilter();
                    if (activeFilter) {
                        applyCharacterState('INTERESTING');
                    } else {
                        applyCharacterState('WELCOME');
                    }
                };
                filterGrid.appendChild(chip);
            });
        }

            let results = [...expressions];

            if (activeFilter) {

            const query = searchQuery.trim().toLowerCase();
            if (query) {
                results = results.filter(e =>
                    e.eng.toLowerCase().includes(query) ||
                    e.fa.includes(query) ||
                    e.pron.toLowerCase().includes(query) ||
                    e.tags.some(t => t.toLowerCase().includes(query))
                );
                if (results.length > 0) {
                    applyCharacterState('THINKING');
                }
            }

            const resultLabel = getLocalizedText({ fa: 'نتیجه', en: 'result' });
            resultCount.textContent = `${results.length} ${resultLabel}`;

            if (results.length === 0) {

        // ============================================================
        // MICROPHONE
        // ============================================================
        let recognition = null;

        function initSpeech() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                micText.textContent = 'مرورگر شما از جستجوی صوتی پشتیبانی نمی‌کند.';
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = currentLanguage === 'fa' ? 'fa-IR' : 'en-US';
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                micText.textContent = getLocalizedText({ fa: 'در حال گوش دادن...', en: 'Listening...' });
                micResult.textContent = '';
                applyCharacterState('STUDYING');
            };

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        micResult.textContent = transcript;
                        searchInput.value = transcript;
                        searchQuery = transcript;
                        showResults();
                        applyCharacterState('SURPRISED');
                        setTimeout(() => {
                            micOverlay.classList.remove('open');
                            isMicActive = false;
                        }, 500);
                    }
                }
                micResult.textContent = transcript;
            };

            recognition.onerror = () => {
                micText.textContent = getLocalizedText({ fa: 'خطا در تشخیص صدا', en: 'Speech error' });
                setTimeout(() => {
                    micOverlay.classList.remove('open');
                    isMicActive = false;
                }, 800);
            };

            recognition.onend = () => {
                if (micOverlay.classList.contains('open')) {
                    micOverlay.classList.remove('open');
                    isMicActive = false;
                }
            };
        }

        function startMic() {
            if (isMicActive) return;
            if (!recognition) initSpeech();
            if (!recognition) {
                alert('مرورگر شما از جستجوی صوتی پشتیبانی نمی‌کند.');
                return;
            }
            recognition.lang = currentLanguage === 'fa' ? 'fa-IR' : 'en-US';
            micOverlay.classList.add('open');
            isMicActive = true;
            micResult.textContent = '';
            micText.textContent = getLocalizedText({ fa: 'برای جستجوی صوتی صحبت کنید...', en: 'Speak for voice search...' });
            try { recognition.start(); } catch (e) {}
        }

        // ============================================================
        // RECORDING
        // ============================================================
        async function startRecording() {
            const selectMsg = getLocalizedText({ fa: 'لطفاً ابتدا یک جمله را با کلیک روی دکمه میکروفون انتخاب کنید.',
                en: 'Please select a sentence first by clicking the microphone button.'
            });
            if (!selectedPhrase) {
                alert(selectMsg);
                return;
            }
            if (isRecording) return;

            audioChunks = [];
            recordedBlob = null;
            playRecBtn.disabled = true;
            saveRecBtn.disabled = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaStream = stream;
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    recordedBlob = blob;
                    const url = URL.createObjectURL(blob);
                    recAudio.src = url;
                    playRecBtn.disabled = false;
                    saveRecBtn.disabled = false;
                    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                    isRecording = false;
                    startRecBtn.disabled = false;
                    startRecBtn.classList.remove('recording');
                    stopRecBtn.disabled = true;
                    visualizer.style.display = 'none';
                    applyCharacterState('SUPER_HAPPY');
                };
                mediaRecorder.start();
                isRecording = true;
                startRecBtn.disabled = true;
                startRecBtn.classList.add('recording');
                stopRecBtn.disabled = false;
                visualizer.style.display = 'inline-flex';
                applyCharacterState('STUDYING');
            } catch (e) {
                const msg = getLocalizedText({ fa: 'دسترسی به میکروفون امکان‌پذیر نیست.', en: 'Microphone access denied.' });
                alert(msg);
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        function playRecording() {
            if (recAudio.src) {
                recAudio.play();
                applyCharacterState('SURPRISED');
            }
        }

        function saveRecording() {
            const savedMsg = getLocalizedText({ fa: '💾 فایل صوتی ذخیره شد!', en: '💾 Audio saved!' });
            if (recordedBlob && selectedPhrase) {
                const fileName =
                    `veseh-${selectedPhrase.eng.replace(/\s/g, '_')}-${new Date().toISOString().slice(0,10)}.webm`;
                const url = URL.createObjectURL(recordedBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                a.click();
                URL.revokeObjectURL(url);
                alert(savedMsg);
                applyCharacterState('SUPER_HAPPY');
            }
        }

            const eng = randomEng.textContent;
            if (eng && eng !== '—') {
                speak(eng);
                applyCharacterState('SURPRISED');
            }
        };

        startRecBtn.onclick = startRecording;
        stopRecBtn.onclick = stopRecording;
        playRecBtn.onclick = playRecording;
        saveRecBtn.onclick = saveRecording;

        vesehImage.onclick = () => {
            if (isSleeping) {
                wakeUpCharacter();
            } else {
                switchCharacterState();
            }
        };

        // ============================================================
        // INIT
        // ============================================================
        renderFilterGrid();
        updateFilterBadge();
        updateStats();
        hideResults();
        initSpeech();
        startCharacterCycle();
        updateTotalInfo();

        console.log('✨ VESEH V2 — موتور جستجوی زندگی روزمره');
        console.log(`📚 ${expressions.length} جمله بارگذاری شد`);
        console.log(`🏷️ ${getAllTags().length} تگ`);
        console.log('🧚 کاراکتر: همراه، نه معلم');
        console.log('🔗 دکمه درباره به پوشه A متصل شد');
    </script>
</body>
</html>
