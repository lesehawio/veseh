<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>Veseh ✦ سیستم پوشه‌ای هوشمند</title>

    <!-- ====== FAVICON ====== -->

    <link rel="icon" type="image/png" sizes="16x16" href="https://uploadkon.ir/uploads/cc0505_26ChatGPT-Image-Jul-6-2026-12-58-54-AM.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="https://uploadkon.ir/uploads/cc0505_26ChatGPT-Image-Jul-6-2026-12-58-54-AM.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
           ریست و اسکرول
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(155, 107, 255, 0.05);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #7C3AED, #4F46E5);
            border-radius: 10px;
        }

        /* ============================================================
           رنگ‌های جادویی
           ============================================================ */
        :root {
            --magic-deep: #0B0720;
            --magic-purple: #6D28D9;
            --magic-indigo: #4338CA;
            --magic-sky: #38BDF8;
            --magic-soft-pink: #F0ABFC;

            --gradient-start: #7C3AED;
            --gradient-end: #4F46E5;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-heavy: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.10);
            --text: #FFFFFF;
            --text-sec: rgba(255, 255, 255, 0.65);
            --accent: #A78BFA;
            --accent-dark: #6D28D9;
            --accent-glow: #C084FC;
            --card: rgba(255, 255, 255, 0.03);
            --shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
            --shadow-hover: 0 25px 45px -12px rgba(124, 58, 237, 0.3);
            --folder-color: #C084FC;
            --folder-bg: rgba(167, 139, 250, 0.08);
            --bg-dark: #0B0720;
            --bg-light: #E8DEFF;
            --text-light: #1A0D2E;
            --text-sec-light: #5B3A7A;
            --card-light: rgba(255, 255, 255, 0.80);
            --border-light: rgba(124, 58, 237, 0.12);
            --shadow-light: 0 20px 35px -10px rgba(124, 58, 237, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            min-height: 100vh;
            background: var(--bg-dark);
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* ============================================================
           تم روشن
           ============================================================ */
        body.light-mode {
            background: #E8DEFF;
            color: #1A0D2E;
        }

        body.light-mode .magic-bg {
            background:
                radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(79, 70, 229, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(167, 139, 250, 0.06) 0%, transparent 50%),
                #E8DEFF;
        }

        body.light-mode .header {
            background: rgba(232, 222, 255, 0.88);
            border-bottom: 1px solid rgba(124, 58, 237, 0.15);
        }
        body.light-mode .header::after {
            background: linear-gradient(90deg, transparent, #7C3AED, transparent);
            opacity: 0.20;
        }
        body.light-mode .logo-img {
            border: none;
            filter: drop-shadow(0 4px 24px rgba(124, 58, 237, 0.20));
        }
        body.light-mode .menu-btn {
            background: rgba(124, 58, 237, 0.06);
            border-color: rgba(124, 58, 237, 0.10);
            color: #1A0D2E;
        }
        body.light-mode .menu-btn:hover {
            background: rgba(124, 58, 237, 0.12);
            border-color: #7C3AED;
        }
        body.light-mode .search-area {
            background: rgba(232, 222, 255, 0.80);
            border-bottom: 1px solid rgba(124, 58, 237, 0.12);
        }
        body.light-mode .search-input {
            background: rgba(124, 58, 237, 0.04);
            border-color: rgba(124, 58, 237, 0.10);
            color: #1A0D2E;
        }
        body.light-mode .search-input::placeholder {
            color: rgba(26, 13, 46, 0.35);
        }
        body.light-mode .search-input:focus {
            border-color: #7C3AED;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.06);
        }
        body.light-mode .clear-search {
            background: rgba(124, 58, 237, 0.06);
            border-color: rgba(124, 58, 237, 0.10);
            color: #1A0D2E;
        }
        body.light-mode .clear-search:hover {
            background: rgba(124, 58, 237, 0.12);
            border-color: #7C3AED;
        }
        body.light-mode .sidebar {
            background: rgba(232, 222, 255, 0.96);
            border-left: 1px solid rgba(124, 58, 237, 0.10);
        }
        body.light-mode .sidebar-header .brand {
            background: linear-gradient(135deg, #7C3AED, #4F46E5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        body.light-mode .sidebar-header .brand i {
            -webkit-text-fill-color: initial;
            color: #7C3AED;
        }
        body.light-mode .close-sidebar {
            border-color: rgba(124, 58, 237, 0.10);
            color: #5B3A7A;
        }
        body.light-mode .close-sidebar:hover {
            border-color: #7C3AED;
            background: rgba(124, 58, 237, 0.04);
            color: #1A0D2E;
        }
        body.light-mode .tree-header {
            color: #1A0D2E;
            background: rgba(124, 58, 237, 0.03);
        }
        body.light-mode .tree-header:hover {
            background: rgba(124, 58, 237, 0.06);
            border-color: rgba(124, 58, 237, 0.08);
        }
        body.light-mode .tree-header .folder-count {
            background: rgba(124, 58, 237, 0.08);
            color: #7C3AED;
        }
        body.light-mode .tree-leaf {
            color: #5B3A7A;
        }
        body.light-mode .tree-leaf:hover {
            background: rgba(124, 58, 237, 0.05);
            color: #1A0D2E;
            border-color: rgba(124, 58, 237, 0.08);
        }
        body.light-mode .tree-leaf .leaf-badge {
            background: rgba(124, 58, 237, 0.06);
            color: #7C3AED;
        }
        body.light-mode .folder-card,
        body.light-mode .phrase-card {
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(124, 58, 237, 0.10);
            box-shadow: 0 20px 35px -10px rgba(124, 58, 237, 0.06);
        }
        body.light-mode .folder-card:hover,
        body.light-mode .phrase-card:hover {
            background: rgba(255, 255, 255, 0.92);
            border-color: #7C3AED;
            box-shadow: 0 25px 45px -12px rgba(124, 58, 237, 0.12);
        }
        body.light-mode .folder-title {
            color: #1A0D2E;
        }
        body.light-mode .folder-desc {
            color: #5B3A7A;
        }
        body.light-mode .folder-meta {
            color: #7C3AED;
        }
        body.light-mode .eng-text {
            color: #1A0D2E;
        }
        body.light-mode .fa-text {
            color: #5B3A7A;
        }
        body.light-mode .meta-path {
            color: #7C3AED;
        }
        body.light-mode .audio-btn {
            background: rgba(124, 58, 237, 0.04);
            border-color: rgba(124, 58, 237, 0.08);
            color: #5B3A7A;
        }
        body.light-mode .audio-btn:hover {
            background: rgba(124, 58, 237, 0.08);
            color: #1A0D2E;
            border-color: #7C3AED;
        }
        body.light-mode .record-bar {
            background: rgba(232, 222, 255, 0.92);
            border-top: 1px solid rgba(124, 58, 237, 0.10);
        }
        body.light-mode .record-bar::before {
            background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.15), transparent);
        }
        body.light-mode .selected-label {
            background: rgba(124, 58, 237, 0.04);
            border-color: rgba(124, 58, 237, 0.08);
            color: #5B3A7A;
        }
        body.light-mode .btn-rec {
            background: rgba(124, 58, 237, 0.04);
            border-color: rgba(124, 58, 237, 0.08);
            color: #1A0D2E;
        }
        body.light-mode .btn-rec:hover:not(:disabled) {
            background: rgba(124, 58, 237, 0.08);
            border-color: #7C3AED;
        }
        body.light-mode .btn-rec.recording {
            background: rgba(239, 68, 68, 0.08);
            border-color: rgba(239, 68, 68, 0.10);
        }
        body.light-mode .back-btn {
            background: rgba(124, 58, 237, 0.04);
            border-color: rgba(124, 58, 237, 0.08);
            color: #5B3A7A;
        }
        body.light-mode .back-btn:hover {
            background: rgba(124, 58, 237, 0.08);
            color: #1A0D2E;
            border-color: #7C3AED;
        }
        body.light-mode .breadcrumb {
            color: #5B3A7A;
        }
        body.light-mode .breadcrumb span {
            color: #7C3AED;
        }
        body.light-mode .theme-toggle {
            background: rgba(124, 58, 237, 0.04);
            border-color: rgba(124, 58, 237, 0.08);
            color: #1A0D2E;
        }
        body.light-mode .theme-toggle:hover {
            background: rgba(124, 58, 237, 0.08);
            border-color: #7C3AED;
        }
        body.light-mode .phrase-card.selected {
            border-color: #7C3AED;
            background: rgba(124, 58, 237, 0.04);
        }
        body.light-mode .recording-hint {
            background: rgba(232, 222, 255, 0.95);
            border-color: rgba(124, 58, 237, 0.15);
            color: #1A0D2E;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
        }
        body.light-mode .overlay {
            background: rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px);
        }
        body.light-mode .sparkle {
            background: #7C3AED;
            box-shadow: 0 0 8px 3px rgba(124, 58, 237, 0.20);
        }
        body.light-mode .bubble {
            background: radial-gradient(circle at 30% 30%, rgba(124, 58, 237, 0.06), rgba(124, 58, 237, 0.01));
            border-color: rgba(124, 58, 237, 0.04);
        }
        body.light-mode .gadget-box {
            background: rgba(255, 255, 255, 0.75);
            border-color: rgba(124, 58, 237, 0.10);
        }
        body.light-mode .stat-item {
            color: #1A0D2E;
        }
        body.light-mode .stat-item .stat-value {
            color: #7C3AED;
        }
        body.light-mode .quote-box {
            background: rgba(124, 58, 237, 0.04);
            border-color: rgba(124, 58, 237, 0.10);
            color: #1A0D2E;
        }
        body.light-mode .tag {
            background: rgba(124, 58, 237, 0.06);
            border-color: rgba(124, 58, 237, 0.08);
            color: #5B3A7A;
        }
        body.light-mode .tag:hover {
            background: rgba(124, 58, 237, 0.12);
            border-color: #7C3AED;
            color: #1A0D2E;
        }
        body.light-mode .lang-toggle {
            background: rgba(124, 58, 237, 0.04);
            border-color: rgba(124, 58, 237, 0.08);
            color: #1A0D2E;
        }
        body.light-mode .lang-toggle:hover {
            background: rgba(124, 58, 237, 0.08);
            border-color: #7C3AED;
        }

        /* ============================================================
           پس‌زمینه جادویی
           ============================================================ */
        .magic-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(124, 58, 237, 0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(79, 70, 229, 0.14) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(167, 139, 250, 0.10) 0%, transparent 50%),
                var(--bg-dark);
            transition: background 0.4s ease;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px 3px rgba(167, 139, 250, 0.5);
            animation: floatUp linear infinite;
            opacity: 0;
        }
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.01));
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: floatUpBubble linear infinite;
            opacity: 0;
            backdrop-filter: blur(2px);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }
        @keyframes floatUpBubble {
            0% {
                transform: translateY(100vh) scale(0.3) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.25;
            }
            85% {
                opacity: 0.25;
            }
            100% {
                transform: translateY(-10vh) scale(1.1) rotate(720deg);
                opacity: 0;
            }
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            background: rgba(11, 7, 32, 0.82);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            position: relative;
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 10%;
            width: 80%;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--magic-sky), var(--magic-soft-pink), transparent);
            opacity: 0.25;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .logo-img {
            height: 140px;
            width: 140px;
            border-radius: 0;
            object-fit: contain;
            filter: drop-shadow(0 8px 32px rgba(167, 139, 250, 0.45));
            border: none;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            flex-shrink: 0;
            background: transparent;
        }
        .logo-img:hover {
            transform: scale(1.08) rotate(-3deg);
            filter: drop-shadow(0 12px 48px rgba(167, 139, 250, 0.55));
        }

        .menu-btn {
            background: rgba(167, 139, 250, 0.10);
            border: 1px solid rgba(167, 139, 250, 0.12);
            width: 56px;
            height: 56px;
            border-radius: 18px;
            font-size: 1.5rem;
            cursor: pointer;
            color: white;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            flex-shrink: 0;
        }
        .menu-btn:hover {
            background: rgba(167, 139, 250, 0.18);
            transform: scale(1.04) rotate(-2deg);
            box-shadow: 0 0 40px rgba(167, 139, 250, 0.08);
            border-color: var(--magic-sky);
        }

        .header-actions {
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .theme-toggle,
        .lang-toggle {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            width: 52px;
            height: 52px;
            border-radius: 16px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .theme-toggle:hover,
        .lang-toggle:hover {
            background: rgba(167, 139, 250, 0.10);
            border-color: var(--magic-sky);
            transform: scale(1.05) rotate(6deg);
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.06);
        }
        .lang-toggle {
            font-weight: 700;
            font-size: 0.9rem;
            width: 60px;
            letter-spacing: 0.5px;
        }

        /* ============================================================
           جستجو
           ============================================================ */
        .search-area {
            background: rgba(11, 7, 32, 0.60);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 0.8rem 2rem;
            position: sticky;
            top: 0;
            z-index: 89;
            border-bottom: 1px solid var(--border);
            position: relative;
            transition: background 0.4s ease, border-color 0.4s ease;
            margin-top: 0;
        }
        .search-box {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            max-width: 820px;
            margin: 0 auto;
        }
        .search-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 3rem;
            padding: 0.8rem 1.8rem;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            transition: 0.3s;
            backdrop-filter: blur(4px);
        }
        .search-input:focus {
            border-color: var(--magic-sky);
            box-shadow: 0 0 0 5px rgba(56, 189, 248, 0.06), 0 0 30px rgba(56, 189, 248, 0.02);
            background: rgba(255, 255, 255, 0.06);
        }
        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }
        .clear-search {
            background: rgba(167, 139, 250, 0.08);
            border: 1px solid rgba(167, 139, 250, 0.10);
            padding: 0.6rem 1.6rem;
            border-radius: 3rem;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
            font-weight: 500;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .clear-search:hover {
            background: rgba(167, 139, 250, 0.15);
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.04);
            transform: scale(1.02);
            border-color: var(--magic-sky);
        }

        /* ============================================================
           SIDEBAR (منوی همبرگری)
           ============================================================ */
        .sidebar {
            position: fixed;
            top: 0;
            right: -480px;
            width: 440px;
            height: 100%;
            background: rgba(11, 7, 32, 0.94);
            backdrop-filter: blur(36px);
            -webkit-backdrop-filter: blur(36px);
            border-left: 1px solid var(--border);
            z-index: 1000;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 1.8rem;
            overflow-y: auto;
            box-shadow: -10px 0 80px rgba(0, 0, 0, 0.5);
        }
        .sidebar.open {
            right: 0;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.50);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 999;
            display: none;
        }
        .overlay.active {
            display: block;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.8rem;
        }
        .sidebar-header .brand {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #C084FC, #38BDF8, #F0ABFC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .sidebar-header .brand i {
            -webkit-text-fill-color: initial;
            color: var(--magic-sky);
        }
        .close-sidebar {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 14px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-sec);
            transition: 0.3s;
        }
        .close-sidebar:hover {
            color: white;
            border-color: var(--magic-soft-pink);
            background: rgba(167, 139, 250, 0.06);
        }

        /* ============================================================
           گجت‌های داخل منوی همبرگری (دستیار، نقل قول، ارزیابی)
           ============================================================ */
        .sidebar-gadgets {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .gadget-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 1.2rem;
            padding: 1.2rem 1.4rem;
            transition: all 0.3s ease;
        }
        .gadget-card:hover {
            border-color: rgba(167, 139, 250, 0.15);
            transform: translateX(-4px);
        }
        .gadget-card .gadget-title {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--magic-sky);
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .gadget-card .gadget-title i {
            font-size: 1rem;
        }

        /* دستیار */
        .assistant-message {
            font-size: 0.85rem;
            color: var(--text-sec);
            line-height: 1.6;
            padding: 0.5rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 0.3rem;
        }
        .assistant-message .highlight {
            color: var(--magic-sky);
            font-weight: 600;
        }

        /* نقل قول */
        .quote-card .quote-text {
            font-size: 0.9rem;
            font-style: italic;
            color: var(--text-sec);
            line-height: 1.6;
        }
        .quote-card .quote-author {
            font-size: 0.7rem;
            color: var(--magic-sky);
            margin-top: 0.4rem;
            text-align: left;
        }

        /* ارزیابی */
        .eval-stats {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .eval-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-sec);
        }
        .eval-row .eval-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .eval-row .eval-value {
            font-weight: 700;
            color: var(--text);
        }
        .eval-bar {
            width: 100%;
            height: 4px;
            background: rgba(167, 139, 250, 0.08);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 0.3rem;
        }
        .eval-bar .eval-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.8s ease;
            background: linear-gradient(90deg, var(--magic-purple), var(--magic-sky));
            width: 0%;
        }

        /* ============================================================
           منوی درختی
           ============================================================ */
        .tree-menu {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }
        .tree-node {
            margin-bottom: 0.1rem;
        }
        .tree-header {
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.7rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            border-radius: 14px;
            transition: 0.2s;
            color: var(--text);
            background: rgba(167, 139, 250, 0.03);
            border: 1px solid transparent;
        }
        .tree-header:hover {
            background: rgba(167, 139, 250, 0.06);
            border-color: rgba(167, 139, 250, 0.06);
            transform: translateX(-4px);
        }
        .tree-header i:first-child {
            transition: 0.2s;
            font-size: 0.7rem;
            color: var(--folder-color);
        }
        .tree-header .node-icon {
            width: 24px;
            font-size: 1rem;
            color: var(--folder-color);
        }
        .tree-header .folder-count {
            margin-right: auto;
            font-size: 0.6rem;
            background: rgba(167, 139, 250, 0.08);
            color: var(--folder-color);
            padding: 0.05rem 0.7rem;
            border-radius: 1rem;
        }
        .tree-children {
            padding-right: 1.6rem;
            display: none;
            border-right: 1px solid rgba(167, 139, 250, 0.06);
            margin-right: 0.4rem;
        }
        .tree-children.open {
            display: block;
        }
        .tree-leaf {
            padding: 0.5rem 0.8rem;
            font-size: 0.78rem;
            cursor: pointer;
            border-radius: 10px;
            margin: 0.15rem 0;
            background: rgba(255, 255, 255, 0.01);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.15s;
            color: var(--text-sec);
            border: 1px solid transparent;
        }
        .tree-leaf:hover {
            background: rgba(167, 139, 250, 0.05);
            color: white;
            transform: translateX(-4px);
            border-color: rgba(167, 139, 250, 0.06);
        }
        .tree-leaf .leaf-badge {
            background: rgba(167, 139, 250, 0.06);
            border-radius: 1rem;
            padding: 0.05rem 0.6rem;
            font-size: 0.55rem;
            color: var(--folder-color);
        }
        .tree-leaf .leaf-text {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ============================================================
           محتوای اصلی
           ============================================================ */
        .main-container {
            padding: 2rem 2rem 6rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .navigation-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .back-btn {
            background: rgba(167, 139, 250, 0.05);
            border: 1px solid rgba(167, 139, 250, 0.08);
            padding: 0.6rem 1.6rem;
            border-radius: 3rem;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-sec);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            backdrop-filter: blur(4px);
        }
        .back-btn:hover {
            background: rgba(167, 139, 250, 0.08);
            color: white;
            border-color: var(--magic-sky);
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.03);
        }
        .breadcrumb {
            font-size: 0.8rem;
            color: var(--text-sec);
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }
        .breadcrumb span {
            color: var(--magic-sky);
            font-weight: 500;
        }
        .breadcrumb i {
            font-size: 0.5rem;
            color: var(--text-sec);
        }

        /* کارت‌ها */
        .items-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .folder-card,
        .phrase-card {
            background: var(--card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 1.8rem;
            padding: 1.2rem 1.8rem;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .folder-card::before,
        .phrase-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.02), transparent);
            pointer-events: none;
        }
        .folder-card:hover,
        .phrase-card:hover {
            transform: translateY(-5px) scale(1.004);
            border-color: rgba(167, 139, 250, 0.20);
            box-shadow: var(--shadow-hover);
            background: rgba(255, 255, 255, 0.04);
        }
        .phrase-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .phrase-card.selected {
            border: 1.5px solid var(--magic-sky);
            background: rgba(56, 189, 248, 0.04);
            box-shadow: 0 0 50px rgba(56, 189, 248, 0.04);
        }
        .folder-title {
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: white;
        }
        .folder-title i {
            color: var(--folder-color);
        }
        .folder-desc {
            font-size: 0.8rem;
            color: var(--text-sec);
            margin-top: 0.3rem;
        }
        .folder-meta {
            font-size: 0.65rem;
            color: var(--folder-color);
            margin-top: 0.3rem;
            display: flex;
            gap: 0.6rem;
            align-items: center;
            opacity: 0.7;
        }
        .eng-text {
            font-weight: 700;
            font-size: 1.1rem;
            direction: ltr;
            text-align: left;
            color: white;
        }
        .fa-text {
            font-size: 0.85rem;
            color: var(--text-sec);
            margin-top: 0.2rem;
        }
        .meta-path {
            font-size: 0.6rem;
            color: var(--folder-color);
            margin-top: 0.2rem;
            opacity: 0.5;
        }
        .audio-btn {
            background: rgba(167, 139, 250, 0.05);
            border: 1px solid rgba(167, 139, 250, 0.06);
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-sec);
            transition: 0.3s;
            padding: 0.4rem 1rem;
            border-radius: 3rem;
        }
        .audio-btn:hover {
            transform: scale(1.06);
            background: rgba(167, 139, 250, 0.10);
            color: white;
            border-color: var(--magic-sky);
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.04);
        }

        /* ============================================================
           نوار ضبط صدا
           ============================================================ */
        .record-bar {
            background: rgba(11, 7, 32, 0.88);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-top: 1px solid var(--border);
            padding: 0.8rem 2rem;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            align-items: center;
            z-index: 80;
            box-shadow: 0 -10px 60px rgba(0, 0, 0, 0.4);
            transition: background 0.4s ease, border-color 0.4s ease;
        }
        .record-bar::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            width: 60%;
            height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--magic-sky), var(--magic-soft-pink), transparent);
            opacity: 0.15;
        }
        .selected-label {
            background: rgba(167, 139, 250, 0.05);
            border-radius: 3rem;
            padding: 0.5rem 1.6rem;
            font-size: 0.8rem;
            font-weight: 500;
            border: 1px solid rgba(167, 139, 250, 0.06);
            color: var(--text-sec);
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .btn-rec {
            background: rgba(167, 139, 250, 0.05);
            border: 1px solid rgba(167, 139, 250, 0.06);
            padding: 0.6rem 1.6rem;
            border-radius: 3rem;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            backdrop-filter: blur(4px);
        }
        .btn-rec:hover:not(:disabled) {
            background: rgba(167, 139, 250, 0.10);
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.03);
        }
        .btn-rec:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .btn-rec.recording {
            background: rgba(239, 68, 68, 0.10);
            border-color: rgba(239, 68, 68, 0.12);
            animation: pulseRec 1.5s infinite;
        }
        @keyframes pulseRec {
            0%,
            100% {
                box-shadow: 0 0 20px rgba(239, 68, 68, 0.04);
            }
            50% {
                box-shadow: 0 0 50px rgba(239, 68, 68, 0.08);
            }
        }
        .visualizer {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            height: 28px;
        }
        .visualizer span {
            width: 4px;
            height: 12px;
            background: var(--magic-sky);
            border-radius: 3px;
            animation: wave 0.6s infinite;
        }
        .visualizer span:nth-child(2) {
            animation-delay: 0.1s;
        }
        .visualizer span:nth-child(3) {
            animation-delay: 0.2s;
        }
        .visualizer span:nth-child(4) {
            animation-delay: 0.3s;
        }
        .visualizer span:nth-child(5) {
            animation-delay: 0.4s;
        }
        .visualizer span:nth-child(6) {
            animation-delay: 0.5s;
        }
        @keyframes wave {
            0%,
            100% {
                height: 10px;
            }
            50% {
                height: 26px;
            }
        }
        .footer-space {
            height: 85px;
        }

        /* حالت ضبط */
        body.recording-mode .main-container,
        body.recording-mode .search-area,
        body.recording-mode .header {
            filter: blur(14px);
            opacity: 0.06;
            pointer-events: none;
            user-select: none;
            transition: 0.4s;
        }
        body.recording-mode .record-bar,
        body.recording-mode .record-bar * {
            filter: blur(0) !important;
            opacity: 1 !important;
            pointer-events: auto !important;
        }
        .recording-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(11, 7, 32, 0.92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(167, 139, 250, 0.12);
            color: white;
            padding: 2.2rem 3.5rem;
            border-radius: 2.5rem;
            font-weight: 600;
            z-index: 200;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            font-size: 1.2rem;
            display: none;
            letter-spacing: 0.5px;
        }
        .recording-hint i {
            color: #EF4444;
            margin-left: 0.8rem;
            animation: pulseDot 0.8s infinite;
        }
        @keyframes pulseDot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.7);
            }
        }
        body.recording-mode .recording-hint {
            display: block;
            animation: pulseHint 1.2s infinite;
        }
        @keyframes pulseHint {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.02);
            }
        }

        /* ============================================================
           ریسپانسیو
           ============================================================ */
        @media(max-width:640px) {
            .sidebar {
                width: 320px;
                right: -360px;
                padding: 1.2rem;
            }
            .main-container {
                padding: 1rem 1rem 6rem 1rem;
            }
            .header {
                padding: 0.5rem 0.8rem;
            }
            .search-area {
                padding: 0.5rem 0.8rem;
                top: 0;
            }
            .record-bar {
                padding: 0.5rem 0.6rem;
                gap: 0.4rem;
            }
            .selected-label {
                max-width: 100px;
                font-size: 0.65rem;
                padding: 0.3rem 0.8rem;
            }
            .btn-rec {
                font-size: 0.65rem;
                padding: 0.3rem 0.8rem;
            }
            .logo-img {
                height: 90px;
                width: 90px;
            }
            .menu-btn {
                width: 44px;
                height: 44px;
                font-size: 1.1rem;
            }
            .theme-toggle,
            .lang-toggle {
                width: 40px;
                height: 40px;
                font-size: 0.9rem;
            }
            .lang-toggle {
                width: 48px;
                font-size: 0.7rem;
            }
            .recording-hint {
                font-size: 0.85rem;
                padding: 1.2rem 1.5rem;
                width: 90%;
            }
            .breadcrumb {
                font-size: 0.65rem;
            }
            .folder-card,
            .phrase-card {
                padding: 0.8rem 1rem;
            }
            .tree-leaf .leaf-text {
                max-width: 120px;
            }
            .sidebar-gadgets {
                gap: 0.8rem;
            }
            .gadget-card {
                padding: 0.8rem 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    پس‌زمینه جادویی
    ============================================================ -->
    <div class="magic-bg" id="magicBg"></div>

    <!-- ============================================================
    HEADER
    ============================================================ -->
    <header class="header">
        <div class="logo-area">
            <button class="menu-btn" id="menuBtn" aria-label="باز کردن منو">
                <i class="fas fa-bars"></i>
            </button>
            <img class="logo-img"
            src="https://uploadkon.ir/uploads/811f05_26ChatGPT-Image-Jul-6-2026-01-27-12-AM.png"
            alt="Veseh Logo" />
        </div>
        <div class="header-actions">
            <button id="langToggle" class="lang-toggle" aria-label="تغییر زبان">FA</button>
            <button id="themeToggle" class="theme-toggle" aria-label="تغییر تم">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
        </div>
    </header>

    <!-- ============================================================
    جستجو
    ============================================================ -->
    <div class="search-area">
        <div class="search-box">
            <i class="fas fa-search" style="color: var(--text-sec);"></i>
            <input type="text" id="searchInput" class="search-input"
            placeholder="✨ جستجو در پوشه‌ها و چانک‌ها..." />
            <button id="clearSearch" class="clear-search">
                <i class="fas fa-times"></i> پاک
            </button>
        </div>
    </div>

    <!-- ============================================================
    محتوای اصلی
    ============================================================ -->
    <main class="main-container">
        <div class="navigation-bar">
            <button id="backBtn" class="back-btn" style="display: none;">
                <i class="fas fa-arrow-right"></i> برگشت
            </button>
            <div class="breadcrumb" id="breadcrumb"></div>
        </div>
        <div id="contentContainer"></div>
    </main>

    <div class="footer-space"></div>

    <!-- ============================================================
    نوار ضبط صدا
    ============================================================ -->
    <div class="record-bar">
        <i class="fas fa-microphone-alt" style="color: var(--text-sec);"></i>
        <span id="selectedLabel" class="selected-label">🎯 روی یک عبارت کلیک کن</span>
        <button id="startRecBtn" class="btn-rec">
            <i class="fas fa-circle" style="color:#EF4444;"></i> ضبط
        </button>
        <button id="stopRecBtn" class="btn-rec" disabled>
            <i class="fas fa-stop"></i> توقف
        </button>
        <button id="playRecBtn" class="btn-rec" disabled>
            <i class="fas fa-play"></i> پخش
        </button>
        <button id="saveRecBtn" class="btn-rec" disabled>
            <i class="fas fa-save"></i> ذخیره
        </button>
        <div id="visualizer" class="visualizer" style="display:none;">
            <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <audio id="recAudio" style="display:none;"></audio>
    </div>

    <!-- هینت ضبط -->
    <div class="recording-hint" id="recordingHint">
        <i class="fas fa-circle"></i> در حال ضبط... از حفظ و بدون نگاه کردن بگو!
    </div>

    <!-- ============================================================
    SIDEBAR (منوی همبرگری با گجت‌های جدید)
    ============================================================ -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="brand"><i class="fas fa-folder-open"></i> Veseh</span>
            <button id="closeSidebar" class="close-sidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- ============================================================
        گجت‌های داخل منو: دستیار، نقل قول، ارزیابی
        ============================================================ -->
        <div class="sidebar-gadgets" id="sidebarGadgets">
            <!-- دستیار هوشمند -->
            <div class="gadget-card">
                <div class="gadget-title"><i class="fas fa-robot"></i> دستیار هوشمند</div>
                <div class="assistant-message" id="assistantMessage">
                    👋 سلام! <span class="highlight" id="assistantPhrase">روی یک عبارت کلیک کن</span> تا راهنمایی بگیرم.
                </div>
            </div>

            <!-- نقل قول روز -->
            <div class="gadget-card quote-card">
                <div class="gadget-title"><i class="fas fa-quote-right"></i> نقل قول روز</div>
                <div class="quote-text" id="dailyQuote">
                    <i class="fas fa-quote-left" style="color:var(--magic-sky);"></i>
                    Practice makes perfect!
                    <i class="fas fa-quote-right" style="color:var(--magic-sky);"></i>
                </div>
                <div class="quote-author">— Veseh Academy</div>
            </div>

            <!-- ارزیابی پیشرفت -->
            <div class="gadget-card">
                <div class="gadget-title"><i class="fas fa-chart-pie"></i> ارزیابی پیشرفت</div>
                <div class="eval-stats">
                    <div class="eval-row">
                        <span class="eval-label"><i class="fas fa-check-circle" style="color:#22C55E;"></i> مسلط شده</span>
                        <span class="eval-value" id="evalMastered">0</span>
                    </div>
                    <div class="eval-row">
                        <span class="eval-label"><i class="fas fa-clock" style="color:#F59E0B;"></i> در حال یادگیری</span>
                        <span class="eval-value" id="evalLearning">0</span>
                    </div>
                    <div class="eval-row">
                        <span class="eval-label"><i class="fas fa-hourglass-start" style="color:#EF4444;"></i> باقی‌مانده</span>
                        <span class="eval-value" id="evalRemaining">0</span>
                    </div>
                    <div class="eval-bar">
                        <div class="eval-fill" id="evalProgressFill" style="width:0%;"></div>
                    </div>
                    <div style="font-size:0.65rem; color:var(--text-sec); text-align:center; margin-top:0.2rem;">
                        <span id="evalPercent">۰%</span> از کل محتوا
                    </div>
                </div>
            </div>
        </div>

        <!-- ============================================================
        منوی درختی
        ============================================================ -->
        <div id="treeMenu" class="tree-menu"></div>
    </aside>

    <div id="overlay" class="overlay"></div>

    <!-- ============================================================
    اسکریپت
    ============================================================ -->
    <script>
        // ============================================================
        // پس‌زمینه جادویی
        // ============================================================
        function createMagicBg() {
            const container = document.getElementById('magicBg');
            const numSparkles = 80;
            const numBubbles = 30;

            for (let i = 0; i < numSparkles; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                const size = 2 + Math.random() * 5;
                sparkle.style.width = size + 'px';
                sparkle.style.height = size + 'px';
                sparkle.style.left = Math.random() * 100 + '%';
                sparkle.style.animationDuration = (7 + Math.random() * 14) + 's';
                sparkle.style.animationDelay = (Math.random() * 18) + 's';
                sparkle.style.boxShadow =
                    `0 0 ${8 + Math.random() * 12}px ${3 + Math.random() * 5}px rgba(167, 139, 250, ${0.2 + Math.random() * 0.3})`;
                container.appendChild(sparkle);
            }

            for (let i = 0; i < numBubbles; i++) {
                const bubble = document.createElement('div');

        function flattenPhrases(node, path = []) {
            let results = [];
            const currentPath = [...path, node.name];
            if (node.phrases) {
                node.phrases.forEach(p => {
                    results.push({
                        eng: p.eng,
                        fa: p.fa,
                        path: currentPath,
                        fullPath: currentPath.join(' › ')
                    });
                });
            }
            if (node.children) {
                node.children.forEach(child => {
                    results.push(...flattenPhrases(child, currentPath));
                });
            }
            return results;
        }

        function countFolders(node) {
            let count = 1;
            if (node.children) {
                node.children.forEach(child => {
                    count += countFolders(child);
                });
            }
            return count;
        }

            allFlatPhrases.push(...flattenPhrases(cat, [cat.name]));

            let breadcrumbHtml = '';
            currentStack.forEach((node, idx) => {
                breadcrumbHtml += `<i class="fas ${idx === 0 ? 'fa-home' : 'fa-chevron-left'}"></i> <span>${node.name}</span> `;
            });
            document.getElementById('breadcrumb').innerHTML = breadcrumbHtml;
            if (item.phrases) {
                const itemsToShow = item.phrases.map(p => ({
                    ...p,
                    fullPath: currentStack.map(s => s.name).join(' › ') + ' › ' + p.eng
                }));
                showContent(item.name, itemsToShow, true, breadcrumbHtml);
            } else if (item.children) {
                showContent(item.name, item.children, false, breadcrumbHtml);
            } else {
                showContent(item.name, [], false, breadcrumbHtml);
            }
            attachAudioEvents();
            updateAll();
        }

        function goBack() {
            if (currentStack.length <= 1) {
                currentStack = [];
                showMainPage();
            } else {
                currentStack.pop();
                const parent = findNodeByPath(currentStack);
                if (parent) {
                    navigateTo(parent, currentStack);
                } else {
                    showMainPage();
                }
            }
        }

        function findNodeByPath(path) {
            if (path.length === 0) return null;
            let current = null;
            for (let cat of folderData) {
                if (cat.name === path[0].name) {
                    current = cat;
                    break;
                }
            }
            if (!current) return null;
            for (let i = 1; i < path.length; i++) {
                if (!current.children) return null;
                let found = null;
                for (let child of current.children) {
                    if (child.name === path[i].name) {
                        found = child;
                        break;
                    }
                }
                if (!found) return null;
                current = found;
            }
            return current;
        }

        function buildTreeMenu() {
            const container = document.getElementById('treeMenu');
            container.innerHTML = '';

            folderData.forEach(cat => {
                const catNode = document.createElement('div');
                catNode.className = 'tree-node';

                const header = document.createElement('div');
                header.className = 'tree-header';
                header.innerHTML = `
                    <i class="fas fa-chevron-left"></i>
                    <i class="fas ${cat.icon} node-icon"></i>
                    ${cat.name}
                    <span class="folder-count">${cat.children ? cat.children.length : 0}</span>
                `;

                const childrenDiv = document.createElement('div');
                childrenDiv.className = 'tree-children';

                function addChildren(parentNode, parentDiv, level = 0) {
                    if (parentNode.children) {
                        parentNode.children.forEach(child => {
                            const childDiv = document.createElement('div');
                            childDiv.className = 'tree-node';

                            const hasChildren = child.children && child.children.length > 0;
                            const hasPhrases = child.phrases && child.phrases.length > 0;

                            const childHeader = document.createElement('div');
                            childHeader.className = 'tree-header';
                            childHeader.style.paddingRight = `${(level + 1) * 8}px`;
                            childHeader.innerHTML = `
                                <i class="fas fa-chevron-left"></i>
                                <i class="fas ${hasChildren ? 'fa-folder' : 'fa-file'} node-icon"></i>
                                ${child.name}
                                ${hasChildren ? `<span class="folder-count">${child.children.length}</span>` : ''}
                            `;

                            const childChildrenDiv = document.createElement('div');
                            childChildrenDiv.className = 'tree-children';

                            if (hasChildren) {
                                addChildren(child, childChildrenDiv, level + 1);
                            } else if (hasPhrases) {
                                child.phrases.forEach(phrase => {
                                    const leaf = document.createElement('div');
                                    leaf.className = 'tree-leaf';
                                    leaf.style.paddingRight = `${(level + 2) * 8}px`;
                                    const isPracticed = practicedSet.has(phrase.eng);
                                    leaf.innerHTML = `
                                        <span class="leaf-text">${isPracticed ? '✅' : '🔊'} ${phrase.eng.substring(0, 25)}</span>
                                        <span class="leaf-badge">📖</span>
                                    `;
                                    leaf.onclick = (e) => {
                                        e.stopPropagation();
                                        const fakeCard = document.createElement('div');
                                        selectPhrase(fakeCard, phrase.eng, phrase.fa);
                                        practicedSet.add(phrase.eng);
                                        updateAll();
                                        updateAssistant(phrase.eng);
                                        if (fakeCard) fakeCard.remove();
                                        closeMenu();
                                        buildTreeMenu();
                                    };
                                    childChildrenDiv.appendChild(leaf);
                                });
                            }

                            let isOpen = false;
                            childHeader.onclick = (e) => {
                                e.stopPropagation();
                                if (hasChildren || hasPhrases) {
                                    isOpen = !isOpen;
                                    childChildrenDiv.classList.toggle('open', isOpen);
                                    const icon = childHeader.querySelector('i:first-child');
                                    if (icon) icon.className = isOpen ? 'fas fa-chevron-down' :
                                        'fas fa-chevron-left';
                                } else {
                                    navigateTo(child, [...currentStack, child]);
                                    closeMenu();
                                }
                            };

                            if (hasChildren || hasPhrases) {
                                childDiv.appendChild(childHeader);
                                childDiv.appendChild(childChildrenDiv);
                            } else {
                                childHeader.onclick = () => { navigateTo(child, [...currentStack, child]);
                                    closeMenu(); };
                                childDiv.appendChild(childHeader);
                            }
                            parentDiv.appendChild(childDiv);
                        });
                    }
                }

                addChildren(cat, childrenDiv, 0);

                let isOpen = false;
                header.onclick = (e) => {
                    e.stopPropagation();
                    isOpen = !isOpen;
                    childrenDiv.classList.toggle('open', isOpen);
                    const icon = header.querySelector('i:first-child');
                    if (icon) icon.className = isOpen ? 'fas fa-chevron-down' : 'fas fa-chevron-left';
                };

                catNode.appendChild(header);
                catNode.appendChild(childrenDiv);
                container.appendChild(catNode);
            });
        }

        // ضبط صدا
        // ============================================================
        let mediaRecorder, audioChunks = [],
            isRecording = false,
            mediaStream = null;
        let recordedBlob = null;

        async function startRecording() {
            if (!currentSelected) {
                alert('🎯 ابتدا روی یک عبارت کلیک کنید');
                return;
            }
            if (isRecording) return;

            document.body.classList.add('recording-mode');
            document.getElementById('visualizer').style.display = 'inline-flex';
            document.getElementById('recordingHint').style.display = 'block';
            document.getElementById('selectedLabel').innerHTML = '🔴 در حال ضبط...';
            document.getElementById('startRecBtn').classList.add('recording');
            audioChunks = [];
            recordedBlob = null;
            document.getElementById('saveRecBtn').disabled = true;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaStream = stream;
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => { if (e.data.size) audioChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    recordedBlob = blob;
                    const url = URL.createObjectURL(blob);
                    document.getElementById('recAudio').src = url;
                    document.getElementById('playRecBtn').disabled = false;
                    document.getElementById('saveRecBtn').disabled = false;
                    if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
                    isRecording = false;
                    document.getElementById('startRecBtn').disabled = false;
                    document.getElementById('startRecBtn').classList.remove('recording');
                    document.getElementById('stopRecBtn').disabled = true;
                    document.body.classList.remove('recording-mode');
                    document.getElementById('visualizer').style.display = 'none';
                    document.getElementById('recordingHint').style.display = 'none';
                    document.getElementById('selectedLabel').innerHTML = currentSelected ?
                        `🎯 “${currentSelected.eng.substring(0, 30)}...”` : '🎯 روی یک عبارت کلیک کن';
                };
                mediaRecorder.start();
                isRecording = true;
                document.getElementById('startRecBtn').disabled = true;
                document.getElementById('stopRecBtn').disabled = false;
            } catch (e) {
                alert('🎤 دسترسی به میکروفون امکانپذیر نیست');
                document.body.classList.remove('recording-mode');
                document.getElementById('visualizer').style.display = 'none';
                document.getElementById('recordingHint').style.display = 'none';
                document.getElementById('startRecBtn').classList.remove('recording');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        function playRecording() {
            const audio = document.getElementById('recAudio');
            if (audio.src) audio.play();
        }

        function saveRecording() {
            if (recordedBlob && currentSelected) {
                const fileName =
                    `veseh-${currentSelected.eng.replace(/\s/g, '_')}-${new Date().toISOString().slice(0,10)}.webm`;
                const url = URL.createObjectURL(recordedBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                a.click();
                URL.revokeObjectURL(url);
                alert('💾 فایل صوتی ذخیره شد!');
            } else {
                alert('⚠️ ابتدا یک عبارت انتخاب کنید و سپس ضبط را انجام دهید.');
            }
        }

                document.querySelector('.btn-rec:nth-child(3)').innerHTML = '<i class="fas fa-circle" style="color:#EF4444;"></i> Record';
                document.querySelector('.btn-rec:nth-child(4)').innerHTML = '<i class="fas fa-stop"></i> Stop';
                document.querySelector('.btn-rec:nth-child(5)').innerHTML = '<i class="fas fa-play"></i> Play';
                document.querySelector('.btn-rec:nth-child(6)').innerHTML = '<i class="fas fa-save"></i> Save';
                document.getElementById('recordingHint').innerHTML =
                    '<i class="fas fa-circle"></i> Recording... Say it from memory without looking!';
            } else {
                searchPlaceholder.placeholder = '✨ جستجو در پوشه‌ها و چانک‌ها...';
                selectedLabel.textContent = currentSelected ?
                    `🎯 “${currentSelected.eng.substring(0, 30)}...”` :
                    '🎯 روی یک عبارت کلیک کن';
                backBtn.innerHTML = '<i class="fas fa-arrow-right"></i> برگشت';
                document.querySelector('.clear-search').innerHTML = '<i class="fas fa-times"></i> پاک';
                document.querySelector('.brand').innerHTML = '<i class="fas fa-folder-open"></i> پوشه‌ها';
                document.querySelector('.gadget-title:first-child').innerHTML = '<i class="fas fa-robot"></i> دستیار هوشمند';
                document.querySelector('.gadget-title:nth-child(2)').innerHTML = '<i class="fas fa-quote-right"></i> نقل قول روز';
                document.querySelector('.gadget-title:last-child').innerHTML = '<i class="fas fa-chart-pie"></i> ارزیابی پیشرفت';
                document.querySelector('.eval-row:nth-child(1) .eval-label').innerHTML =
                    '<i class="fas fa-check-circle" style="color:#22C55E;"></i> مسلط شده';
                document.querySelector('.eval-row:nth-child(2) .eval-label').innerHTML =
                    '<i class="fas fa-clock" style="color:#F59E0B;"></i> در حال یادگیری';
                document.querySelector('.eval-row:nth-child(3) .eval-label').innerHTML =
                    '<i class="fas fa-hourglass-start" style="color:#EF4444;"></i> باقی‌مانده';
                document.querySelector('.record-bar .fa-microphone-alt').parentElement.innerHTML =
                    '<i class="fas fa-microphone-alt" style="color: var(--text-sec);"></i>';
                document.querySelector('.btn-rec:nth-child(3)').innerHTML = '<i class="fas fa-circle" style="color:#EF4444;"></i> ضبط';
                document.querySelector('.btn-rec:nth-child(4)').innerHTML = '<i class="fas fa-stop"></i> توقف';
                document.querySelector('.btn-rec:nth-child(5)').innerHTML = '<i class="fas fa-play"></i> پخش';
                document.querySelector('.btn-rec:nth-child(6)').innerHTML = '<i class="fas fa-save"></i> ذخیره';
                document.getElementById('recordingHint').innerHTML =
                    '<i class="fas fa-circle"></i> در حال ضبط... از حفظ و بدون نگاه کردن بگو!';
            }
        }

        // ============================================================
        // راه‌اندازی
        // ============================================================
        function closeMenu() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        }

        document.getElementById('menuBtn').onclick = () => {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').classList.add('active');
            updateAll();
        };
        document.getElementById('closeSidebar').onclick = closeMenu;
        document.getElementById('overlay').onclick = closeMenu;

        document.getElementById('themeToggle').onclick = () => {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('themeIcon');
            if (document.body.classList.contains('light-mode')) {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        };

        document.getElementById('langToggle').onclick = toggleLanguage;

        document.getElementById('backBtn').onclick = goBack;

        document.getElementById('startRecBtn').onclick = startRecording;
        document.getElementById('stopRecBtn').onclick = stopRecording;
        document.getElementById('playRecBtn').onclick = playRecording;
        document.getElementById('saveRecBtn').onclick = saveRecording;

        const searchInputElem = document.getElementById('searchInput');
        searchInputElem.addEventListener('input', (e) => searchGlobal(e.target.value));
        document.getElementById('clearSearch').onclick = () => {
            searchInputElem.value = '';
            showMainPage();
        };

        buildTreeMenu();
        showMainPage();
        updateAll();

        console.log('✨ Veseh - نسخه نهایی با لوگوی درشت، منوی همبرگری با دستیار، نقل قول و ارزیابی');
        console.log('📋 تعداد کل چانک‌ها:', allFlatPhrases.length);
        console.log('🌐 دکمه تغییر زبان (FA/EN) اضافه شد');
    </script>

</body>
</html>
